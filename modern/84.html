      <h1>踏上天鹅之路</h1>
      <div class="date">2019.9.5</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        踏上天鹅之路<br>
        挥之不去的阴霾依然如故<br>
        水中火山<br>
        酝酿它的愤怒<br>
        千万年前<br>
        摇曳大地之间<br>
        绵绵细雨<br>
        为它寿衣覆盖<br>
        深沉的海是最后的棺材<br>
        死亡却不曾到来<br>
        听到它的呻吟<br>
        千山颤抖万水奔腾<br>
        如此深渊<br>
        不是昔日的主宰<br>
        看着时光缓缓流过现在<br>
        太阳脱落下的光芒暗淡<br>
        有什么存在<br>
        用毛笔添上黑白<br>
        一生一死的灯火轮回<br>
        除非地上干涸最后一滴水<br>
        否则鲜红不会于夜晚重现<br>
        年轻真好<br>
        手握潘多拉魔盒<br>
        翻箱倒柜找不到希望<br>
        脚下沟壑多妩媚<br>
        深渊见我应如是
      </div>
