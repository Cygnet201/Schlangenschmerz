      <h1>我像一只盛夏的蛹</h1>
      <div class="date">2020.5.2</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我像一只盛夏的蛹<br>
        在不合时宜的季节横在大路中<br>
        我像个鹰溪桥的囚徒<br>
        逃脱绞刑的端流吊起了彼岸的痛苦<br>
        我像法布里亚诺的列车员<br>
        看见失去孩子的灵魂蠕动匍匐<br>
        我像个红砖房街区转悠的房客<br>
        在一缕过去的情香引导下就戮<br>
        我像推着海浪的时光<br>
        在历史的夹缝中捞取粘着形式的迷雾<br>
        啊，波西米亚<br>
        群山里的湖泊里也会有珍珠？
      </div>
    </div>
