      <h1>戏谚·一</h1>
      <div class="date">2025.3.14</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        命运为父，死亡为母<br>
        我们在世俗的餐桌上永不餍足<br>
        遗忘为琴，欲望为鼓<br>
        我们在灵魂的舞台上从未演出
      </div>
    </div>
