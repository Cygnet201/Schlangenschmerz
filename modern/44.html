    <div class="poem-header">
      <h1>毕业</h1>
      <div class="date">2021.5.20</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        就叫那些半敞开的学生宿舍的<br>
        大门如牢笼似的关闭吧<br>
        我们躺在濡湿的阴暗板床上<br>
        一排熄灭的白炽灯犹在闪耀<br>
        闪耀着冷淡的白光<br>
        一堵墙<br>
        一堵气味的腐墙已然耸立<br>
        沿着深绿的半透明玻璃<br>
        围成小小的孤岛<br>
        四周涌动着波涛<br>
        月色的波涛<br>
        谁也没有说话<br>
        静静地闭上眼睛<br>
        白天的追魂的锁链突然显影了<br>
        仿佛X光照向了墨色的雕版字框<br>
        表格、括号、字母、方块<br>
        一律加以缠绕<br>
        自由的灵<br>
        怎会苦苦守在<br>
        遥远的索洛维茨基群岛<br>
        我们甚至还不在那里<br>
        而在湿热的南方<br>
        氤氲之中<br>
        门似乎开了一条凉薄的缝
      </div>
