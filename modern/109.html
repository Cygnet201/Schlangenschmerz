    <div class="poem-header">
      <h1>四面楚歌</h1>
      <div class="date">2018.11.2</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        成为四面楚歌包围下的兵卒<br>
        王已自刎于雨中的乌江<br>
        现在我还活着<br>
        我还有三捆干柴、一袋粮食和<br>
        一匹良马<br>
        我还可以周游天下<br>
        乌云越来越黑，像墨滴<br>
        旗帜升起又倒下<br>
        楚，楚
      </div>
    </div>
