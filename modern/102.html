    <div class="poem-header">
      <h1>即使恐惧都是幸福的</h1>
      <div class="date">2018.12.2</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        即使恐惧都是幸福的，<br>
        战栗为了新世界。<br>
        渺小如尘埃，<br>
        又怎样呢？<br>
        只要见过星辰大海！<br>
        害怕塔尖，<br>
        就俯首甘愿？<br>
        现在的一切都是虚无，<br>
        虚无中诞生的才能叫实在。<br>
        开在花园里的花，<br>
        和藏在武器库里的剑，<br>
        不是可悲的吗？<br>
        那么，可怜自己吧！<br>
        仍要期许，<br>
        仍要希望，<br>
        趁天空破碎之前！
      </div>
    </div>
