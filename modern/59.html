    <div class="poem-header">
      <h1>无意识杀人</h1>
      <div class="date">2020.6.28</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我的手机上显示了一个又一个通知<br>
        就像几十封勒索信<br>
        它们配有清脆的铃声<br>
        指示我下一步动作
      </div>

      <div class="stanza">
        啊，我愚钝的脑子终于开了窍<br>
        这就是那个对吧<br>
        “杀死你，与你何干？”<br>
        在意识与意识的海洋里<br>
        有人大如星斗<br>
        有人胆小似牛<br>
        不管是否筑起栅栏<br>
        都会被淤泥淹没
      </div>

      <div class="stanza">
        我只是产出信息的不智能流水线<br>
        在白天<br>
        我只是产出信息的手工匠人<br>
        在夜晚
      </div>

      <div class="stanza">
        白天他们给我过多的灯<br>
        夜晚却吝啬一度电照亮<br>
        穿行于白昼的主<br>
        你简直引人亵渎
      </div>

      <div class="stanza">
        时间不会拿出怀表<br>
        所有的具象都必然落榜<br>
        什么会留在信息海洋<br>
        是欲、言说还是月亮
      </div>

      <div class="stanza">
        当然是你<br>
        直到人类灭亡
      </div>
    </div>
