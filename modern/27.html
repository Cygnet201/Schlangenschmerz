  <div class="poem-page">

    <div class="poem-header">
      <h1>无题</h1>
      <div class="date">2022.3.1</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        一不小心<br>
        又到了晚上六点<br>
        明明没有登陆<br>
        却还是刷到了A-Soul<br>
        晚饭吃了青椒肉丝<br>
        牙齿里姜丝还卡着缝<br>
        等会拉上几个网友<br>
        准备聊到凌晨四点钟
      </div>

      <div class="stanza">
        这就是我的生活<br>
        我并不热爱的生活<br>
        超过200尼特的光线<br>
        仿佛是外星人的UFO<br>
        要抓我去做实验<br>
        然后放我回屋
      </div>

      <div class="stanza">
        吹着天台的冷风<br>
        看着城市的霓虹<br>
        像个傻子<br>
        对着高楼诉情衷<br>
        他们是一万面镜子<br>
        映出我燃烧的面孔
      </div>
    </div>
