    <div class="poem-header">
      <h1>送城楼送到西</h1>
      <div class="date">2021.11.2</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        送城楼送到西<br>
        天边有朵积雨云<br>
        灰尘四起<br>
        炊烟梦忆<br>
        墙上填进一座坟<br>
        从前没有诗人<br>
        往后却会如春笋<br>
        树苗总死成枯根<br>
        落日飞秋霞<br>
        烧滚长江沸大洋<br>
        天人五衰也长恨
      </div>
    </div>
