    <div class="poem-header">
      <h1>路</h1>
      <div class="date">2016.12.11</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我，<br>
        是城里的路。<br>
        他们规划了我，<br>
        我规划了万物。
      </div>

      <div class="stanza">
        我承载了他们<br>
        匆匆的脚步，<br>
        我带他们<br>
        进了浓稠的雾。
      </div>

      <div class="stanza">
        尽管直行，<br>
        抵达原初的木。<br>
        灰色的果实，<br>
        从天空落下荒芜。
      </div>

      <div class="stanza">
        我是这孤寂世界，<br>
        正在书写的遗嘱。<br>
        我让永生，<br>
        为我谢幕。
      </div>
    </div>
