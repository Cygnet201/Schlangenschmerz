      <h1>冷秋</h1>
      <div class="date">2021.10.9</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        天上下起小雨<br>
        我的不鲜红的痛苦<br>
        都淌进街上地砖的缝隙<br>
        等太阳一晒<br>
        蒸发成透明的虚无
      </div>
    </div>
