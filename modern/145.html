      <h1>为自由呐喊时</h1>
      <div class="date">2017.3.11</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        为自由呐喊时<br>
        不知受到多少束缚<br>
        痛斥虚无的声音<br>
        本身就带着无助<br>
        常常不知为什么而笑<br>
        笑得难看又不堪<br>
        满目高楼大厦<br>
        哪经得起风吹雨打<br>
        所谓隐私<br>
        是暴露无遗的遁辞<br>
        夜里千家灯火<br>
        柔弱的水似的反抗<br>
        高呼耶稣的名的人<br>
        正不遗余力地堕落<br>
        大音大象皆已远去<br>
        五音怪象更得民心<br>
        君士坦丁堡换了名号<br>
        长安不再长安<br>
        情况是全然颠倒<br>
        浮士德在最后本不必<br>
        去什么天堂地狱
      </div>
    </div>
