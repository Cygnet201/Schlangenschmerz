<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">

  <title>为自由呐喊时 - 折樱诗集</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" aria-label="切换主题"></button>
  <div class="poem-page">
    <a href="../index.html" class="back-link">返回目录</a>
    <div class="poem-header">
      <h1>为自由呐喊时</h1>
      <div class="date">2017.3.11</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        为自由呐喊时<br>
        不知受到多少束缚<br>
        痛斥虚无的声音<br>
        本身就带着无助<br>
        常常不知为什么而笑<br>
        笑得难看又不堪<br>
        满目高楼大厦<br>
        哪经得起风吹雨打<br>
        所谓隐私<br>
        是暴露无遗的遁辞<br>
        夜里千家灯火<br>
        柔弱的水似的反抗<br>
        高呼耶稣的名的人<br>
        正不遗余力地堕落<br>
        大音大象皆已远去<br>
        五音怪象更得民心<br>
        君士坦丁堡换了名号<br>
        长安不再长安<br>
        情况是全然颠倒<br>
        浮士德在最后本不必<br>
        去什么天堂地狱
      </div>
    </div>
    <div class="feedback-section">
      <h3>留下你的评价</h3>
      <form id="feedbackForm" onsubmit="return submitFeedback(event)">
        <input type="hidden" name="entry.133248077" value="为自由呐喊时">
        <div class="rating-group">
          <input type="radio" name="entry.1288177946" id="star5" value="5"><label for="star5"></label>
          <input type="radio" name="entry.1288177946" id="star4" value="4"><label for="star4"></label>
          <input type="radio" name="entry.1288177946" id="star3" value="3" checked><label for="star3"></label>
          <input type="radio" name="entry.1288177946" id="star2" value="2"><label for="star2"></label>
          <input type="radio" name="entry.1288177946" id="star1" value="1"><label for="star1"></label>
        </div>
        <textarea class="feedback-textarea" name="entry.769828955" placeholder="有什么想说的？（选填）"></textarea>
        <button type="submit" class="feedback-submit">提交</button>
      </form>
      <div class="feedback-msg" id="feedbackMsg">感谢你的评价！</div>
      <iframe name="gform-iframe" style="display:none;"></iframe>
    </div>
    <div class="side-nav side-nav-left"><a href="144.html"><span class="arrow">‹</span>上一首</a></div>

    <nav class="poem-nav">
      <a href="../index.html">返回目录</a>
    </nav>
  </div>
  <script>
  function submitFeedback(e) {
    e.preventDefault();
    var form = document.getElementById('feedbackForm');
    var data = new URLSearchParams(new FormData(form));
    fetch('https://docs.google.com/forms/d/e/1FAIpQLSc3hdB_IxX3wFBLahVYqQSeWvqlrnERiASxdolsJQjntCa4fw/formResponse', {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: data
    }).then(function() {
      form.style.display = 'none';
      document.getElementById('feedbackMsg').style.display = 'block';
    }).catch(function() {
      form.style.display = 'none';
      document.getElementById('feedbackMsg').style.display = 'block';
    });
    return false;
  }
  </script>
  <script>
(function() {
  var root = document.documentElement;
  var btn = document.getElementById('themeBtn');
  var saved = localStorage.getItem('theme');

  function isDark() {
    if (saved) return saved === 'dark';
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function apply() {
    if (saved) {
      root.setAttribute('data-theme', saved);
    } else {
      root.removeAttribute('data-theme');
    }
    btn.textContent = isDark() ? '\u2600' : '\u263D';
  }

  function toggleTheme() {
    var dark = isDark();
    saved = dark ? 'light' : 'dark';
    localStorage.setItem('theme', saved);
    apply();
  }

  window.toggleTheme = toggleTheme;
  apply();

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
    if (!localStorage.getItem('theme')) apply();
  });
})();
</script>
</body>
</html>
