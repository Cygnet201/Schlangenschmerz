    <div class="poem-header">
      <h1>阳光入侵的每一场战役</h1>
      <div class="date">2018.9.20</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        阳光入侵的每一场战役<br>
        都像凡尔登<br>
        我必须拿起勒贝尔<br>
        去捍卫我的精神<br>
        夜晚昭示着短暂的胜利<br>
        而黎明会卷土重来<br>
        再见，武器<br>
        当丧钟为谁而鸣
      </div>
    </div>
