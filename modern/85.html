    <div class="poem-header">
      <h1>以可乐为酒</h1>
      <div class="date">2019.8.29</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        以可乐为酒<br>
        两升是否足够<br>
        白日煎熬的灵魂<br>
        夜晚潺潺入喉<br>
        窗外云层聚拢<br>
        太阳耀眼如钟<br>
        唯有深海负隅顽抗<br>
        其余尽为焦土<br>
        盐从井出<br>
        卤水如玉如茵<br>
        更如今<br>
        秋草叶枯
      </div>
    </div>
