    <div class="poem-header">
      <h1>堤岸</h1>
      <div class="date">2025.12.15</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我站在天空的堤岸上<br>
        俯瞰与我血脉相连的大地<br>
        那是无数星辰的后裔中最伟大的一个<br>
        其余的不孝子孙<br>
        为了实现命运的预言<br>
        挥动刀枪棍棒<br>
        杀出血海骨墙
      </div>
    </div>
