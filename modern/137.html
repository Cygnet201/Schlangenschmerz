      <h1>轰鸣</h1>
      <div class="date">2017.10.16</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        从血汗工厂来到组装车间<br>
        一切颠覆了想象<br>
        它在梦中散发出清香<br>
        却于现实扭曲为颓唐<br>
        巨大齿轮嗡嗡作响<br>
        突然一个喷嚏<br>
        细小的耳蜗早已失常<br>
        就在几天前<br>
        夏入秋冬太过迅速<br>
        还来不及更衣适应<br>
        就不幸染上感冒<br>
        早该看见那只黑猫时<br>
        取出外套换上
      </div>
    </div>
