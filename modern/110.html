    <div class="poem-header">
      <h1>彼岸也要与尘世一样</h1>
      <div class="date">2018.11.1</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        彼岸也要与尘世一样<br>
        自杀的看不起寿终正寝的<br>
        农夫看不起学者<br>
        说拉丁文的看不起说英语的<br>
        本来谁也不为生存打算了<br>
        但是没了这些<br>
        怎么打发这样长的寂静啊<br>
        现在很热闹<br>
        人人都在争吵<br>
        现世的艺术家们<br>
        为何不将之好好刻画<br>
        看看这般的世界<br>
        是否如你所愿<br>
        啊，是否如你所愿！
      </div>
    </div>
