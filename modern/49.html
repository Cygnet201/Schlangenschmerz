    <div class="poem-header">
      <h1>人们总会找到一个出口</h1>
      <div class="date">2021.3.22</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        人们总会找到一个出口<br>
        一个重复的出口<br>
        一个烟熏火燎的出口<br>
        当一个出口不再通行<br>
        另外十个会悄然开启<br>
        人们总会抵达终点<br>
        那里是数据<br>
        那里是生命<br>
        那里是死亡<br>
        那里是一切<br>
        那里没有出口
      </div>
    </div>
