      <h1>一瞬怀疑</h1>
      <div class="date">2016.12.11</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        善心就停留在怀疑的泥潭中吗<br>
        还是正义指错了方向<br>
        是出卖尊严亵渎了神灵吗<br>
        还是彼此傲慢所以低眉沉默<br>
        远在天边的事情也近在眼前<br>
        触手可及触目惊心<br>
        正是这种轻佻的期许<br>
        骗过一代又一代自以为善的善人<br>
        不该也不必<br>
        应该也未必<br>
        毕竟连悼文也是打印的<br>
        听说最近连心脏也能打印了<br>
        是层层剖开然后层层堆叠而成<br>
        精雕细琢巧夺天工<br>
        一件鲜活的艺术品<br>
        代理病人缺席的心<br>
        那是医学上微不足道的奇迹<br>
        无人会信所以人人都信<br>
        反过来亦如是
      </div>
    </div>
