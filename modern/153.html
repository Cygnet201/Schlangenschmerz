<body>

  <div class="poem-page">
    <a href="../index.html" class="back-link">返回目录</a>
    <div class="poem-header">
      <h1>思</h1>
      <div class="date">2016.12.11</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        游子的船，<br>
        总要泊于港湾。
      </div>

      <div class="stanza">
        北国雪，江南雨，<br>
        无一可暖。<br>
        见惯了黎明海色，<br>
        也将琵琶反弹：<br>
        不归，不归，<br>
        莫问几更还。
      </div>

      <div class="stanza">
        隐约钟声，<br>
        问起游子的答案：<br>
        荒芜一切之后，<br>
        才有如画这般。
      </div>

      <div class="stanza">
        风信子，蝴蝶兰，<br>
        梦去长夏花满。<br>
        徘徊夜里，<br>
        暴雨初晴，<br>
        不是归程胜归程：<br>
        再扬风帆。<br>
        出走的游子，<br>
        最想念港湾。
      </div>
    </div>

          <input type="radio" name="entry.1288177946" id="star5" value="5"><label for="star5"></label>

          <input type="radio" name="entry.1288177946" id="star3" value="3" checked><label for="star3"></label>
          <input type="radio" name="entry.1288177946" id="star2" value="2"><label for="star2"></label>
          <input type="radio" name="entry.1288177946" id="star1" value="1"><label for="star1"></label>
        </div>
        <button type="submit" class="feedback-submit">提交评分</button>
      </form>
      <div class="feedback-msg" id="feedbackMsg">感谢你的评价！</div>

  <script>
  function submitFeedback(e) {
    e.preventDefault();
    var form = document.getElementById('feedbackForm');
    var data = new URLSearchParams(new FormData(form));
    fetch('https://docs.google.com/forms/d/e/1FAIpQLSc3hdB_IxX3wFBLahVYqQSeWvqlrnERiASxdolsJQjntCa4fw/formResponse', {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: data
    }).then(function() {
      form.style.display = 'none';
      document.getElementById('feedbackMsg').style.display = 'block';
    }).catch(function() {
      form.style.display = 'none';
      document.getElementById('feedbackMsg').style.display = 'block';
    });
    return false;
  }
  (function() {
    var poemTitle = '思';
    fetch('https://poetry201.netlify.app/.netlify/functions/ratings?poem=' + encodeURIComponent(poemTitle))
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d && d.count > 0) {
          var stars = '';
          var full = Math.floor(d.avg);
          var half = d.avg - full >= 0.5;
          for (var i = 0; i < full; i++) stars += '★';
          if (half) stars += '☆';
          document.getElementById('ratingStats').innerHTML =
            '<span class="stats-stars">' + stars + '</span> ' +
            '<span class="stats-avg">' + d.avg + '</span>' +
            '<span class="stats-count">' + d.count + ' 人评分</span>';
        }
      }).catch(function() {});
  })();
  </script>
  <script>
(function() {
  var root = document.documentElement;
  var btn = document.getElementById('themeBtn');
  var saved = localStorage.getItem('theme');

  function isDark() {
    if (saved) return saved === 'dark';
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function apply() {
    if (saved) {
      root.setAttribute('data-theme', saved);
    } else {
      root.removeAttribute('data-theme');
    }
    btn.textContent = isDark() ? '\u2600' : '\u263D';
  }

  function toggleTheme() {
    var dark = isDark();
    saved = dark ? 'light' : 'dark';
    localStorage.setItem('theme', saved);
    apply();
  }

  window.toggleTheme = toggleTheme;
  apply();

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
    if (!localStorage.getItem('theme')) apply();
  });
})();
</script>

    });
