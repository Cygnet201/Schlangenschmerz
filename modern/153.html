    <div class="poem-header">
      <h1>思</h1>
      <div class="date">2016.12.11</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        游子的船，<br>
        总要泊于港湾。
      </div>

      <div class="stanza">
        北国雪，江南雨，<br>
        无一可暖。<br>
        见惯了黎明海色，<br>
        也将琵琶反弹：<br>
        不归，不归，<br>
        莫问几更还。
      </div>

      <div class="stanza">
        隐约钟声，<br>
        问起游子的答案：<br>
        荒芜一切之后，<br>
        才有如画这般。
      </div>

      <div class="stanza">
        风信子，蝴蝶兰，<br>
        梦去长夏花满。<br>
        徘徊夜里，<br>
        暴雨初晴，<br>
        不是归程胜归程：<br>
        再扬风帆。<br>
        出走的游子，<br>
        最想念港湾。
      </div>
    </div>
