      <h1>永远流血</h1>
      <div class="date">2022.3.1</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        永远流血<br>
        永远腐烂<br>
        永远滋养群鸦之宴<br>
        胜于公道<br>
        胜于天平<br>
        胜于跳动的红纱绫<br>
        巍然不倒<br>
        岿然不动<br>
        天地任改颜色<br>
        日尽夜来<br>
        暗入明升<br>
        一生重过万山
      </div>
    </div>
