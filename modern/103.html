      <h1>呼唤沉默</h1>
      <div class="date">2018.12.1</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        放下手机，进入无所适从的世界<br>
        失败接踵而至<br>
        孤独纷至沓来<br>
        田园的气味被雾霾掩盖<br>
        只记得表达、表达<br>
        语言染上艾滋<br>
        空洞占领嘴巴<br>
        就算现在不停呼唤沉默<br>
        喧嚣依旧招摇过市<br>
        沉默只是悄然而至<br>
        却突然消失<br>
        那是病危的症状<br>
        从平原到高山<br>
        着实许多行走的人<br>
        咀嚼中如痴如狂<br>
        美妙的夜无人欣赏<br>
        世俗惊扰梦乡
      </div>
    </div>
