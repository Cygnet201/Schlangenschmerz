    <div class="poem-header">
      <h1>湖</h1>
      <div class="date">2016.12.11</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我的寂寞是天上的湖泊，<br>
        沉默着辽阔。<br>
        越是狂风紧贴在面上时，<br>
        越使它澄澈。
      </div>

      <div class="stanza">
        它澄澈，<br>
        海潮倒映着它的蓝色。<br>
        层层云浪，<br>
        是它无处安定的寄托。
      </div>

      <div class="stanza">
        还好它，<br>
        不至于太孤独。<br>
        因为昨日的它，<br>
        已经沉沉睡下。
      </div>
    </div>
