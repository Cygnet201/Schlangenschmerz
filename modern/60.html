      <div class="date">2020.6.4</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        万叶之恋<br>
        荣枯一天天<br>
        洒下碎阳<br>
        剪去风和雨<br>
        无生无死<br>
        簌簌花开时
      </div>
