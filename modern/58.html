    <div class="poem-header">
      <h1>当我献出提灯</h1>
      <div class="date">2020.6.28</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        当我献出提灯<br>
        重回黑夜萧瑟的街道<br>
        秋风起而迎接<br>
        归来唱和的符号<br>
        我意义不在<br>
        不在意义之上<br>
        之上没有神明<br>
        神明没有命相<br>
        通往脐带的血已经流干<br>
        降落的青鸟何时去往她的山<br>
        答案知道我<br>
        我却不知道答案<br>
        列车行进至灰色的群像<br>
        两串托尔斯泰的顺序螺旋回荡<br>
        只需一个名字<br>
        也不必将之颂扬
      </div>
    </div>
