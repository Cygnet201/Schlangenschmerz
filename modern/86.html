    <div class="poem-header">
      <h1>我梦见深沉的黑夜里</h1>
      <div class="date">2019.8.22</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我梦见深沉的黑夜里<br>
        一个人敲击他的手机<br>
        用锤子和钉子<br>
        裂纹和火花<br>
        为光阴刻下印记<br>
        那是唯一的光<br>
        只是无法照亮远方<br>
        而没有梦的日子<br>
        我在哪里<br>
        去海拉尔<br>
        拿灵魂化作的烟尘<br>
        略过草原上<br>
        四处奔腾的玛门
      </div>
    </div>
