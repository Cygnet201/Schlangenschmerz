    <div class="poem-header">
      <h1>回</h1>
      <div class="date">2016.12.11</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        晴空总是挂着笑脸，<br>
        默然面对深渊。<br>
        虽然彼此毫不在乎，<br>
        还是时常挂念。
      </div>

      <div class="stanza">
        风会在下雨时，<br>
        捎来晴空的泪滴。<br>
        云也在浪花后，<br>
        传递深渊的歉意。
      </div>

      <div class="stanza">
        他们都不会开口，<br>
        因为他们深知：<br>
        永恒的无言，<br>
        不会说再见。
      </div>
    </div>
