    <div class="poem-header">
      <h1>路旁的樱花缀枝头</h1>
      <div class="date">2017.3.19</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        路旁的樱花缀枝头<br>
        一簇挨着一簇<br>
        在乍暖还寒、阴晴不定的天里<br>
        盼着雨，盼着细雨<br>
        因它身上好多扬尘<br>
        昨夜雨至，风也至<br>
        片片散落无马来蹄
      </div>
    </div>
