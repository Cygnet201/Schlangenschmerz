<body>
  <div class="poem-page">
    <a href="../index.html" class="back-link">返回目录</a>
    <div class="poem-header">
      <h1>朋友</h1>
      <div class="date">2022.3.1</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我和她<br>
        哒哒哒<br>
        仿佛钟表的两根指针<br>
        从圆盘中横切而过<br>
        未能一刻触碰
      </div>

      <div class="stanza">
        也许曾有那么一刻<br>
        我们重叠了<br>
        可下一秒就分开<br>
        就这样重复千万次
      </div>

      <div class="stanza">
        我想要触碰你<br>
        哪怕只有一瞬间<br>
        也想感受你的心
      </div>

      <div class="stanza">
        但我只是看着<br>
        我只能看着<br>
        时光在你的移动中流逝<br>
        星辰诞生又毁灭<br>
        我想到了让我们转动的齿轮<br>
        它是什么时候在那里的呢？
      </div>

      <div class="stanza">
        也许齿轮会停下<br>
        那个时刻我们恰好重叠、依偎<br>
        说两句甜蜜的话<br>
        然后<br>
        时间静止了<br>
        一切都不再有意义
      </div>
    </div>
