    <div class="poem-header">
      <h1>人死之后</h1>
      <div class="date">2022.3.18</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        人死之后<br>
        就会变成昨日的幽灵
      </div>

      <div class="stanza">
        昨日的幽灵会吃人<br>
        析骸而爨<br>
        然而只在夜里可以听见<br>
        太阳是它们的克星
      </div>

      <div class="stanza">
        这是一个46亿年的长夜<br>
        群星的律法在夜中低垂<br>
        暗淡，发出可怜的微光
      </div>

      <div class="stanza">
        天顶的穹幕倒扣于地上<br>
        一个个坐火箭的人向苍穹拉弓<br>
        他们的尸骨热得发烫<br>
        犹如根根紧绷的琴弦<br>
        弹奏了太久的声响
      </div>

      <div class="stanza">
        昨日的幽灵们不愁衣食<br>
        在奶酪与蛆虫中建起城池<br>
        高楼大厦，金屋银瓦
      </div>

      <div class="stanza">
        ——恒转如瀑流
      </div>
    </div>
