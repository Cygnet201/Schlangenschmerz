      <h1>灰色的雨悄然而下</h1>
      <div class="date">2017.11.27</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        灰色的雨悄然而下<br>
        行道上仅留落魄画家<br>
        手里两张满是灰色的画<br>
        没有画商看得上他<br>
        评价他“不合时宜”<br>
        无论画什么<br>
        都是灰色模样<br>
        就连紫罗兰在他笔下<br>
        也不得不敛其芳华<br>
        人们嘲笑他“灰色画家”<br>
        他安眠于1452年<br>
        据说倒在喷泉广场的<br>
        一张长椅上<br>
        于佛罗伦萨
      </div>
    </div>
