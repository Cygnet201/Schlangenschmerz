    <div class="poem-header">
      <h1>把意识扔进堕落的海洋</h1>
      <div class="date">2019.9.29</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        把意识扔进堕落的海洋<br>
        躯壳漂浮在月球上<br>
        我望着地球蓝色背影<br>
        质问黑暗为何还未沉没<br>
        声音没有传到耳膜<br>
        嘴唇干燥以至开裂<br>
        吮吸自己的血<br>
        一颗星辰已是暮年<br>
        向外洒出无数碎片<br>
        多么寂静<br>
        夜空<br>
        连黑暗也消失
      </div>
    </div>
