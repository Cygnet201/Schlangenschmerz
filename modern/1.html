<body>
  <div class="poem-page">
    <a href="../index.html" class="back-link">返回目录</a>
    <div class="poem-header">
      <h1>我</h1>
      <div class="date">2026.3.23</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我是从不枯竭的河流<br>
        我是承载末日的奔马<br>
        我是搅动海洋的风暴
      </div>

      <div class="stanza">
        我是消融于光中的阴影<br>
        我是文明无法治愈的疾病<br>
        我是醒来时无法忘记的梦
      </div>

      <div class="stanza">
        我是虚空<br>
        我是破碎的苍穹
      </div>
    </div>
