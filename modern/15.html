  <div class="poem-page">

    <div class="poem-header">
      <h1>一切如常</h1>
      <div class="date">2025.2.8</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        人心中沉淀的死亡<br>
        阴影一般<br>
        是心脏搏动的燃料
      </div>

      <div class="stanza">
        我们畏惧死亡如同畏惧他人的面庞<br>
        我们害怕死亡如同害怕天上的月亮<br>
        于是神造起了像<br>
        生命燃烧自己<br>
        希望永远沐浴在阳光之下<br>
        恐惧捕获了痛苦的奴隶<br>
        卑劣绞杀了强者的脚心<br>
        那是一场洗礼！
      </div>

      <div class="stanza">
        消逝的永不归来<br>
        业已存在的倒要向还未出生的讨债
      </div>

      <div class="stanza">
        无意识犯下的罪就像一滴墨汁<br>
        洒在了洁白无瑕的盐湖里<br>
        染啊染啊<br>
        溺死了一只想要喝水的猴子
      </div>
    </div>
