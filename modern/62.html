    <div class="poem-header">
      <h1>不能飞行的夜航船</h1>
      <div class="date">2020.5.18</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        不能飞行的夜航船<br>
        群星闪耀在水面<br>
        不停追逐漂浮的银光<br>
        一圈又一圈<br>
        也会看看天空<br>
        那些棋局般的瞳孔清冷如神<br>
        裸露的海床多么荒凉<br>
        蒸汽荡起波浪<br>
        跟随灯火的指引<br>
        前行啊前行<br>
        永恒的太阳坠落后<br>
        迎向黎明<br>
        永恒的太阳沉没后<br>
        航向黎明
      </div>
    </div>
