    <div class="poem-header">
      <h1>我试图拐入岔道</h1>
      <div class="date">2020.10.27</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我试图拐入岔道<br>
        但车轮总在自我变向<br>
        它冰冷的声音提示<br>
        这辆车正在前往<br>
        第斯蒂尔<br>
        蒸汽呛得我流泪<br>
        我和这辆车永远无法和解<br>
        我点燃一根香烟<br>
        停止在雨中思考<br>
        远处的金色城郭遥遥在望<br>
        但它早已没有辉煌<br>
        只剩下挤满了的空壳<br>
        谁都知道来这里为了什么<br>
        蒸馏出灵魂的刹那<br>
        就代表着人性的升华<br>
        此后分离灰暗的想象元素<br>
        又一位合格的市民诞生<br>
        有人说<br>
        那不过是一具空壳<br>
        我同意<br>
        但没人能拐上岔道<br>
        即使油门变成了异教徒
      </div>
    </div>
