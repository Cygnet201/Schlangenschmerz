      <h1>一身老旧黑皮衣</h1>
      <div class="date">2017.3.31</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        一身老旧黑皮衣<br>
        不必掩饰的沧桑气<br>
        偏偏是个少年人<br>
        提黑伞的白面书生<br>
        扬州烟雨比不得山城<br>
        雾雨连绵惨惨戚戚<br>
        路边茶馆沾了脂粉<br>
        难闻，少行人<br>
        樱花五分咲<br>
        从这条柏油路铺到那边当铺<br>
        不近不远距离<br>
        但愿他别动身<br>
        太晚了，列车在半夜凌晨<br>
        可汽笛声不知怎么就起<br>
        远去，最后一声长鸣<br>
        塞满乡愁无别绪
      </div>
    </div>
