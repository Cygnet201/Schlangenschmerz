      <h1>两可</h1>
      <div class="date">2019.12.17</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        死亡是场盛宴<br>
        愿宾主尽欢<br>
        世间亿万饕餮<br>
        咀嚼声声祝餐<br>
        为往生者以血肉<br>
        成为群星的灵<br>
        只是行在时空<br>
        上升吧<br>
        坠海的伊卡洛斯<br>
        追逐永生之人<br>
        此身并非你所有<br>
        回到天上的故乡<br>
        凯旋<br>
        要在宇宙中<br>
        由颗颗彗星<br>
        传唱无数光年<br>
        海洋如此辽阔<br>
        任其辗转腾挪<br>
        看见宇宙暗淡的斑点<br>
        抚摸它千疮百孔的脸<br>
        记忆不再撕扯<br>
        意识随光芒消逝<br>
        无形之形<br>
        与之一切
      </div>
    </div>
