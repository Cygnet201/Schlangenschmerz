    <div class="poem-header">
      <h1>白昼</h1>
      <div class="date">2017.3.9</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        温暖的坟墓拉拽着我的每一根肋骨<br>
        凝滞已久积寒已深的空气紧紧盖住<br>
        太阳还在云外逍遥自在未来<br>
        夜幕无怨无悔忠臣似的等待<br>
        几小时前灯火一盏一盏还别有一盏<br>
        不经意间全部歇店打烊暂时晦暗<br>
        玲珑剔透的夜收拾行李准备退场<br>
        不明就里的我为此黯然神伤<br>
        酒啊酒啊被我借给了嵇中散<br>
        现在窘迫却是之前只顾欣欢<br>
        生活无外乎如此模样<br>
        外边正刮疾风下骤雨<br>
        楼下庭院的山茶<br>
        若是招展花枝烦请告知
      </div>
    </div>
