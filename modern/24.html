    <div class="poem-header">
      <h1>行人走在街上</h1>
      <div class="date">2022.3.19</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        行人走在街上<br>
        每一间店铺都拉下了卷帘门<br>
        拐入小区的车道放下了横杆<br>
        没有坐的地方<br>
        他走得很快<br>
        两边都是灰暗的墙壁和千万只眼睛<br>
        在耸动、在挤压<br>
        沸腾不安、心神凌乱
      </div>

      <div class="stanza">
        即使是困了<br>
        也还有追击的猛禽<br>
        地板上残留着白日的蒸温<br>
        岩浆烤熟了他的脚板<br>
        森森白骨宛如诱人的餐饭
      </div>

      <div class="stanza">
        他无法停下<br>
        要是跃进脚底的岩浆多好<br>
        灵魂拾走了一群漂亮的野兽<br>
        从此地狱便勾连余身<br>
        清晰的硫磺味乌云密布<br>
        世上多是魔鬼的影子
      </div>
    </div>
