      <h1>迷幻</h1>
      <div class="date">2020.5.14</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        咖啡粉的迷幻香气充斥着老店<br>
        一抔骨粉吸上了天<br>
        调酒师打的三个响指<br>
        在艺伎的歌舞声中应为虚无<br>
        烟色的夹克上积雪<br>
        从肺里咳出荒芜<br>
        我在扭曲的世界找寻黑皇帝<br>
        是男是女还是数<br>
        高脚杯在轻碰时破碎<br>
        地板通往幽邃的醒梦<br>
        退到退无可退处<br>
        三百加仑的费用<br>
        作为昨晚因果的律令<br>
        看着橡木桶里装满了冷血<br>
        我笑得像个影子
      </div>
    </div>
