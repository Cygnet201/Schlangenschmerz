      <h1>走廊小酌——致摆渡人</h1>
      <div class="date">2018.12.7</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        许多陌生人从走廊行过<br>
        浮光打在美酒倒影上<br>
        醉人香气迷住北归的大雁<br>
        我还没有见过小酌的人<br>
        要么他还太小<br>
        觉得太阳无上<br>
        月亮藏在云窗外<br>
        要么他已太老<br>
        大地牵住衰败的手脚<br>
        荆棘浇灌盐水味道<br>
        要么死神呀<br>
        向剧场举起镰刀<br>
        断壁残垣却是新鲜<br>
        一处血在地上<br>
        一场雪在天上<br>
        我还没见过小酌的人
      </div>
    </div>
