    <div class="poem-header">
      <h1>梦入旧时未来</h1>
      <div class="date">2019.1.9</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        梦入旧时未来<br>
        瓦砾片片皆光彩<br>
        火于黑暗中燃起<br>
        确实明灯<br>
        倒进酒中影<br>
        追寻再追寻<br>
        音乐从远方来<br>
        悠远幽怨却无缘<br>
        留步驻足欣赏呵<br>
        列车已经飞驰而过<br>
        玻璃悄然破碎<br>
        静止强风穿透耳膜<br>
        我将离去<br>
        不见残魂<br>
        一切罪赎买<br>
        用火、用水、用言语<br>
        继以沉默
      </div>
    </div>
