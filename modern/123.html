      <h1>在这小气的时代</h1>
      <div class="date">2018.4.7</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        在这小气的时代<br>
        人群很拥挤<br>
        喧嚣已成闹剧<br>
        卷烟一缕缕<br>
        逃不出去
      </div>
