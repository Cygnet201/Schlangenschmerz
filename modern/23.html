<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>拒绝看书从我做起 - 折樱诗集</title>
  <script>(function(){var s=localStorage.getItem('theme');if(s)document.documentElement.setAttribute('data-theme',s)})()</script>
  <link rel="stylesheet" href="https://unpkg.com/@waline/client@v3/dist/waline.css">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" aria-label="切换主题"></button>
  <div class="poem-page">
    <a href="../index.html" class="back-link">返回目录</a>
    <div class="poem-header">
      <h1>拒绝看书从我做起</h1>
      <div class="date">2022.4.12</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        拒绝看书从我做起<br>
        字与字之间的链接脆弱得像是饼干碎屑<br>
        向着跳跃的墨水祈祷奇迹<br>
        犹如凌空朝着大海一跃
      </div>

      <div class="stanza">
        栽入无底的海洋<br>
        黑暗在无光中生长<br>
        游来游去的鱼儿四处奔忙<br>
        看生命如何乖张
      </div>

      <div class="stanza">
        仍然沉溺于水中的塞壬<br>
        要按照命运蛊惑君王<br>
        放开歌喉说出词语<br>
        是否传达了自己的沦丧
      </div>

      <div class="stanza">
        我在狂雨中呼喊<br>
        妖风卷起城市的波澜<br>
        千万颗流心滚向寂静的永暗<br>
        崩塌后成为词山
      </div>
    </div>
    <div class="feedback-section">
      <h3>留下你的评价</h3>
      <div class="rating-stats" id="ratingStats"></div>
      <form id="feedbackForm" onsubmit="return submitFeedback(event)">
        <input type="hidden" name="entry.133248077" value="拒绝看书从我做起">
        <div class="rating-group">
          <input type="radio" name="entry.1288177946" id="star5" value="5"><label for="star5"></label>
          <input type="radio" name="entry.1288177946" id="star4" value="4"><label for="star4"></label>
          <input type="radio" name="entry.1288177946" id="star3" value="3" checked><label for="star3"></label>
          <input type="radio" name="entry.1288177946" id="star2" value="2"><label for="star2"></label>
          <input type="radio" name="entry.1288177946" id="star1" value="1"><label for="star1"></label>
        </div>
        <button type="submit" class="feedback-submit">提交评分</button>
      </form>
      <div class="feedback-msg" id="feedbackMsg">感谢你的评价！</div>
      <iframe name="gform-iframe" style="display:none;"></iframe>
    </div>
    <div class="comment-section">
      <h3>留下你的评论</h3>
      <div id="waline"></div>
    </div>
    <div class="side-nav side-nav-left"><a href="22.html"><span class="arrow">‹</span>上一首</a></div>
    <div class="side-nav side-nav-right"><a href="24.html"><span class="arrow">›</span>下一首</a></div>
    <nav class="poem-nav">
      <a href="../index.html">返回目录</a>
    </nav>
  </div>
  <script>
  function submitFeedback(e) {
    e.preventDefault();
    var form = document.getElementById('feedbackForm');
    var data = new URLSearchParams(new FormData(form));
    fetch('https://docs.google.com/forms/d/e/1FAIpQLSc3hdB_IxX3wFBLahVYqQSeWvqlrnERiASxdolsJQjntCa4fw/formResponse', {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: data
    }).then(function() {
      form.style.display = 'none';
      document.getElementById('feedbackMsg').style.display = 'block';
    }).catch(function() {
      form.style.display = 'none';
      document.getElementById('feedbackMsg').style.display = 'block';
    });
    return false;
  }
  (function() {
    var poemTitle = '拒绝看书从我做起';
    fetch('https://poetry201.netlify.app/.netlify/functions/ratings?poem=' + encodeURIComponent(poemTitle))
      .then(function(r) { return r.json(); })
      .then(function(d) {
        if (d && d.count > 0) {
          var stars = '';
          var full = Math.floor(d.avg);
          var half = d.avg - full >= 0.5;
          for (var i = 0; i < full; i++) stars += '★';
          if (half) stars += '☆';
          document.getElementById('ratingStats').innerHTML =
            '<span class="stats-stars">' + stars + '</span> ' +
            '<span class="stats-avg">' + d.avg + '</span>' +
            '<span class="stats-count">' + d.count + ' 人评分</span>';
        }
      }).catch(function() {});
  })();
  </script>
  <script>
(function() {
  var root = document.documentElement;
  var btn = document.getElementById('themeBtn');
  var saved = localStorage.getItem('theme');

  function isDark() {
    if (saved) return saved === 'dark';
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function apply() {
    if (saved) {
      root.setAttribute('data-theme', saved);
    } else {
      root.removeAttribute('data-theme');
    }
    btn.textContent = isDark() ? '\u2600' : '\u263D';
  }

  function toggleTheme() {
    var dark = isDark();
    saved = dark ? 'light' : 'dark';
    localStorage.setItem('theme', saved);
    apply();
  }

  window.toggleTheme = toggleTheme;
  apply();

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
    if (!localStorage.getItem('theme')) apply();
  });
})();
</script>
  <script type="module">
    import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';
    init({
      el: '#waline',

      path: window.location.pathname,
      lang: 'zh-CN',
      requiredMeta: ['nick'],
      placeholder: '写下你的感想…',
    });
  </script>
</body>
