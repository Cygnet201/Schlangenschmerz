    <div class="poem-header">
      <h1>拒绝看书从我做起</h1>
      <div class="date">2022.4.12</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        拒绝看书从我做起<br>
        字与字之间的链接脆弱得像是饼干碎屑<br>
        向着跳跃的墨水祈祷奇迹<br>
        犹如凌空朝着大海一跃
      </div>

      <div class="stanza">
        栽入无底的海洋<br>
        黑暗在无光中生长<br>
        游来游去的鱼儿四处奔忙<br>
        看生命如何乖张
      </div>

      <div class="stanza">
        仍然沉溺于水中的塞壬<br>
        要按照命运蛊惑君王<br>
        放开歌喉说出词语<br>
        是否传达了自己的沦丧
      </div>

      <div class="stanza">
        我在狂雨中呼喊<br>
        妖风卷起城市的波澜<br>
        千万颗流心滚向寂静的永暗<br>
        崩塌后成为词山
      </div>
    </div>
