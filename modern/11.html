    <div class="poem-header">
      <h1>九歌·一</h1>
      <div class="date">2025.4.30</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        在一片巨大的坟场中<br>
        骷髅、僵尸排成无数行<br>
        失去面庞的游魂在唱歌<br>
        “生来好，生来好，<br>
        “生来罪孽少不了，<br>
        “欲火如毒药，<br>
        “世界似冰窖，<br>
        “骨髓是燃料，<br>
        “皮肉为囚牢，<br>
        “尝遍苦痛登高峰，<br>
        “饮尽思念戮仙翁！”<br>
        一旁的无常却笑<br>
        远处又有声音<br>
        “幻也，幻也，<br>
        “梦也，梦也，<br>
        “人间永轮转，<br>
        “九幽如瀑还。”<br>
        诸般景色清风一般<br>
        穿过晶莹的眼帘<br>
        意识如同珠玉<br>
        内心似是琉璃<br>
        仿若一个若隐若现的蛋<br>
        有什么东西将要破壳而出<br>
        将要如何<br>
        将要如何<br>
        风吹铃响<br>
        天中雾浓<br>
        暮色苍茫
      </div>
