      <h1>梦</h1>
      <div class="date">2016.12.11</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        少年以为脚下的大地，<br>
        最初到最后都稳固。
      </div>

      <div class="stanza">
        他却做了个可怕的梦：<br>
        地球失去了心，<br>
        水泥为它葬礼。<br>
        地球被裹成木乃伊，<br>
        大地从此缺席。
      </div>

      <div class="stanza">
        谁都没有注意到，<br>
        地球轨道的偏移。<br>
        天文学家们，<br>
        也绝口不提。
      </div>

      <div class="stanza">
        所以末日，<br>
        如斯美好：<br>
        少年走在公路上，<br>
        世界从此静寂。
      </div>
    </div>
