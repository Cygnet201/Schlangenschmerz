    <div class="poem-header">
      <h1>我的眼睛只有半页纸</h1>
      <div class="date">2020.5.14</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我的眼睛只有半页纸<br>
        写下的所有符号<br>
        无法包含<br>
        世界的万一<br>
        当一句话给出它的判断<br>
        我疑心<br>
        那是进入天堂的谜语<br>
        窄门上闪耀着<br>
        最终湮灭的启明星
      </div>
    </div>
