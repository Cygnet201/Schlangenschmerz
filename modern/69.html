    <div class="poem-header">
      <h1>每天早上的至暗时刻</h1>
      <div class="date">2020.3.18</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        每天早上的至暗时刻<br>
        拿起武器开始接受<br>
        一针一针又一针<br>
        上瘾的大脑握住拳头<br>
        坐上公寓方舟<br>
        翻过信息海洋<br>
        阳光榨干人最后的水分<br>
        入夜远非结束<br>
        黎明再敲丧钟<br>
        它们从屏幕袭来<br>
        情绪挨着情绪<br>
        有理由相信<br>
        信封将不会封以火漆<br>
        指纹已经足够油腻<br>
        它将继续<br>
        必然胜利<br>
        我们尾随<br>
        我们书写<br>
        我们记忆
      </div>
    </div>
