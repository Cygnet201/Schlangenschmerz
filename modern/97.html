      <h1>明天，明天将是</h1>
      <div class="date">2019.2.25</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        明天，明天将是<br>
        一场葬礼<br>
        远远地，有人望<br>
        高高的白帆<br>
        竟炊烟袅袅<br>
        雨滴静静地流过<br>
        死亡
      </div>
    </div>
