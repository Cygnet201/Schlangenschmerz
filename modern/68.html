      <h1>细雪纷纷</h1>
      <div class="date">2020.3.27</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        细雪纷纷<br>
        站在煤灰洒落的白地上<br>
        血有余温<br>
        我看向钟楼<br>
        风在拨弄时针<br>
        满是恒星死后的尘啊<br>
        带走我的魂
      </div>
    </div>
