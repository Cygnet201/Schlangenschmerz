      <h1>人是唯美的毒</h1>
      <div class="date">2019.12.7</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        人是唯美的毒<br>
        香及远处<br>
        岸上歌声如泣诉<br>
        莫应<br>
        江海一舟渡
      </div>
    </div>
