    <div class="poem-header">
      <h1>有人找到了他的路</h1>
      <div class="date">2020.5.1</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        有人找到了他的路<br>
        路上有黄金和蜂蜜<br>
        有人死在了烟雨中<br>
        中间有朦胧的苍穹<br>
        路和路相交于十字口<br>
        十字口再汇聚成一座城<br>
        城门前站着一位士兵<br>
        他一边说：“你不能又侍奉神，”<br>
        一边伸手：“又侍奉玛门。”
      </div>
    </div>
