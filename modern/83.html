    <div class="poem-header">
      <h1>他出声唤我的那一刻</h1>
      <div class="date">2019.9.10</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        他出声唤我的那一刻<br>
        我幽灵般摇摆<br>
        有颗决眦的眼球<br>
        凝视我心脏<br>
        唤作天<br>
        宇宙之帝皇<br>
        宽敞的行道<br>
        都摆上了路障<br>
        海上一轮明月升<br>
        惊涛骇浪<br>
        小舟悠悠其间尔
      </div>
    </div>
