      <h1>冬天的下午</h1>
      <div class="date">2021.11.27</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        冬天的下午<br>
        很冷<br>
        光是坐着<br>
        就是苦行<br>
        没有太阳<br>
        云层里还藏着雨<br>
        风呜呜地吹<br>
        我还在家里<br>
        想着再睡一觉<br>
        睡一觉<br>
        也许醒来之后<br>
        能看见死亡
      </div>
    </div>
