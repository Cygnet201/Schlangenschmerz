      <h1>火车离开时</h1>
      <div class="date">2019.5.27</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        火车离开时<br>
        雨敲打车窗<br>
        愁丝编织成雨<br>
        拖住云间落下的光<br>
        我将被送往<br>
        远方的病床<br>
        修饰成图书馆模样<br>
        看着像天堂<br>
        落叶盼望秋季<br>
        绿草怅恨春分<br>
        路上的扬尘<br>
        飞向香格里拉<br>
        剑门关盖雪被<br>
        嘉陵江冻冰层<br>
        冬天晚来的日子里<br>
        钟楼若有钢琴声
      </div>
    </div>
