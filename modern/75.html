    <div class="poem-header">
      <h1>一天接着一天</h1>
      <div class="date">2019.12.14</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        一天接着一天<br>
        日子过去了<br>
        树叶落到水泥地上<br>
        寒气漂泊在耳根<br>
        三餐成了负担<br>
        书里文字看着怪诞<br>
        走在教室迷宫里<br>
        窗外传来雨的香气<br>
        总能见到自己<br>
        过去、现在、未来<br>
        留下的影子<br>
        天空之门大开<br>
        祖星遥遥闪烁<br>
        有许多重要的事<br>
        不在人类之中
      </div>
    </div>
