      <h1>诀别</h1>
      <div class="date">2016.12.11</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        光明的路是有的<br>
        但我走上去<br>
        又会被阴影追上<br>
        我不是自由的灵魂<br>
        只是一具偶然创造<br>
        创造必然的躯壳<br>
        是什么阻止我迈向死亡<br>
        我亲手缔造一个个<br>
        流淌着岩浆的深渊<br>
        迟早，火焰会灼烧我身<br>
        神圣的语言降临，审判<br>
        没有痛苦也赶走虚无<br>
        因为我将走进<br>
        从前天堂的废墟<br>
        而你们将美丽而长生<br>
        从躯壳里爬出的无力感<br>
        撕咬灵魂仿佛盛宴<br>
        在春吼出阴霾<br>
        面向桃花低眉顺眼<br>
        破灭的灯和暗处的主宰<br>
        他们把一切神圣的<br>
        都演成希腊戏剧<br>
        爱、哀<br>
        输了生命也淌不出<br>
        殷红如血<br>
        证明我来过
      </div>
    </div>
