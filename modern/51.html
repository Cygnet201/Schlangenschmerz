    <div class="poem-header">
      <h1>天知道</h1>
      <div class="date">2021.1.1</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        天知道<br>
        谁才是一只鸟<br>
        足以滑过它的表皮<br>
        从镜子中坠落<br>
        我曾向宇宙问询<br>
        人类是否应当飞向<br>
        他们的群山<br>
        宇宙没有答案<br>
        我在观看<br>
        却精疲力竭<br>
        我想宇宙是对的<br>
        沉默是比喧嚣更强的言说<br>
        无视是比轻蔑更宽和的态度<br>
        人应铸铁<br>
        神当如是
      </div>
    </div>
