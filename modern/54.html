    <div class="poem-header">
      <h1>水管漏了</h1>
      <div class="date">2020.10.22</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        水管漏了<br>
        睡觉时有三只蚊子<br>
        天也冷<br>
        在下雪<br>
        明天他们要动工<br>
        我要到哪里做梦
      </div>

      <div class="stanza">
        远征<br>
        去往还未被人踏足的他乡<br>
        故土是焦虑的产物<br>
        而我是一炉离奇的妒火<br>
        只会燃烧<br>
        从不哀愁
      </div>
    </div>
