    <div class="poem-header">
      <h1>人类永远像个孩子</h1>
      <div class="date">2018.10.30</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        人类永远像个孩子<br>
        孩子作了孩子的父<br>
        孩子作了孩子的母<br>
        孩子还要在孩子中牧首称雄<br>
        群蝇荟萃，如享太牢<br>
        天上的风过后<br>
        野草低垂<br>
        牛羊才成群结队<br>
        猛兽怎俯首低眉<br>
        在一片麻醉的烟雾中<br>
        谁会？
      </div>
    </div>
