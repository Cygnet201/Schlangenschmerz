    <div class="poem-header">
      <h1>我在否定</h1>
      <div class="date">2018.11.20</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我在否定<br>
        ——这最高的权柄<br>
        荒芜废墟中<br>
        唯一的信物<br>
        给尘世的庸庸碌碌<br>
        送上堂皇冠冕<br>
        现在你是王了<br>
        可你还不是<br>
        美丽的、无上的、善的<br>
        他们太远了，太远了<br>
        非要到看不见你的地方才有<br>
        天上没有<br>
        宇宙也没有<br>
        不是活的，却也鲜活如生<br>
        让我流血<br>
        升以玫瑰香味<br>
        孑然于虚空
      </div>
    </div>
