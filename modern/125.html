    <div class="poem-header">
      <h1>平静的夜晚</h1>
      <div class="date">2018.3.25</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        平静的夜晚<br>
        月亮在云中跳起华尔兹<br>
        所有光从天井中泄出<br>
        照着不眠人<br>
        盏盏路灯明明夺目<br>
        像个孩子煊赫一时<br>
        夜色染九分<br>
        不愿盼望黎明来到呵<br>
        就让长夜快些走<br>
        仍旧无梦温
      </div>
    </div>
