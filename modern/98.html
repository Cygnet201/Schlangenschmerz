      <h1>这是怎样的时代？</h1>
      <div class="date">2019.2.22</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        这是怎样的时代？<br>
        想要怨恨给我苦难的人，<br>
        却怎么也找不出来。<br>
        他们也受害，<br>
        他们也戕害。<br>
        我也在其中，<br>
        如羔羊待宰。<br>
        我拥有虚无的权力，<br>
        他们霸占话语的顶峰。<br>
        千块高原上，<br>
        冻结着并非真理的雪。<br>
        神明离去多时，<br>
        人尽皆知，<br>
        也无不幻想着，<br>
        自己将要攫取那个位置！<br>
        我在哪里，<br>
        为了生存？<br>
        我在海里，<br>
        为了生存。<br>
        他们喃喃细语，<br>
        涨潮了，<br>
        浪打的欢呼，<br>
        身边没有我。
      </div>
    </div>
