      <h1>我们的远方没有计划</h1>
      <div class="date">2019.7.24</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我们的远方没有计划<br>
        日子越来越琐碎<br>
        酷似南方湿热的盛夏<br>
        只有在祖先的记忆中找寻<br>
        群山之上回响<br>
        遥远的悠长的牧歌<br>
        故事曾经对未来寄予厚望<br>
        而时光戏耍了一半怀揣大梦的人<br>
        另一半已在天堂<br>
        虚无也变得逼仄和扁平<br>
        似乎无关紧要<br>
        什么东西还残留着重量<br>
        能继续留在母亲身旁<br>
        想起跨越山海的奇迹之桥<br>
        在上面眺望<br>
        水既非镜子也非死亡
      </div>
    </div>
