    <div class="poem-header">
      <h1>语言脆弱无比</h1>
      <div class="date">2018.10.11</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        语言脆弱无比<br>
        在深夜的孤独里<br>
        无声留得一席之地<br>
        光鲜的文字<br>
        给盛装的人<br>
        夜里，赤条条的我们<br>
        当然也要有慰藉<br>
        来吧，失语的倦鸟<br>
        向上飞去<br>
        追寻群星的足迹<br>
        为了什么也不必<br>
        黎明啊，黎明
      </div>
    </div>
