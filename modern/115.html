    <div class="poem-header">
      <h1>忘却吧</h1>
      <div class="date">2018.10.6</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        忘却吧<br>
        忘却吧<br>
        浮光掠影<br>
        铭记啊<br>
        铭记啊<br>
        天高海阔<br>
        生活将拿去我的生命<br>
        我将宴请群鸦<br>
        尽食我骨肉<br>
        生命里没有灵魂<br>
        生命里只有欺骗
      </div>
    </div>
