    <div class="poem-header">
      <h1>无数星辰穿过我</h1>
      <div class="date">2023.11.29</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        无数星辰穿过我<br>
        在世界的每个角落<br>
        碎裂、重组、生活<br>
        再见了<br>
        所有的忧愁痛苦<br>
        欢乐喜悦<br>
        你们结出的果实会落下<br>
        却不会生根<br>
        因为我是一条永不停歇的河流
      </div>
    </div>
