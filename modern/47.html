    <div class="poem-header">
      <h1>摩尼之河</h1>
      <div class="date">2021.4.30</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我沿着摩尼之河<br>
        走入死亡的彼岸<br>
        看那<br>
        他们已将此地征服<br>
        永恒只是一个选择<br>
        一个无趣的课题
      </div>

      <div class="stanza">
        金色的河流<br>
        来自死亡的骨灰<br>
        看那<br>
        他们已将秘密挖掘<br>
        摩尼成为一个完美的圆<br>
        一个不留缺憾的世界
      </div>
    </div>
