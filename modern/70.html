      <h1>迷人的夜逝去</h1>
      <div class="date">2020.3.8</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        迷人的夜逝去<br>
        危险、阴冷<br>
        高峰上的星辰<br>
        落下三滴蜂蜜酒<br>
        一滴成黄金<br>
        一滴入深海<br>
        一滴化鸷鸟<br>
        飞吧<br>
        风暴就要来啦<br>
        在那之前<br>
        先用油墨烧出黑烟<br>
        再扇动白色的翅膀<br>
        将城市掠遍<br>
        你当归向星辰<br>
        那是湛蓝的山<br>
        那是众生之眼
      </div>
    </div>
