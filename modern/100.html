    <div class="poem-header">
      <h1>人世如冰湖</h1>
      <div class="date">2018.12.30</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我要在人世炽热的冰湖上<br>
        浇一把冰凉的火<br>
        从每个无辜的人手上洒落的鲜血<br>
        还未见过深渊吧<br>
        深渊早咀嚼过其中的灵魂<br>
        这苦不能洗涤<br>
        甜味最多算追赠<br>
        我在雪夜里看远处城堡呵<br>
        走不到也得走的旅途
      </div>
    </div>
