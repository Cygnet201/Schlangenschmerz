    <div class="poem-header">
      <h1>我们生活在月球背面</h1>
      <div class="date">2020.6.30</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我们生活在月球背面<br>
        前往光明的另一边<br>
        像朵高高的向日葵<br>
        重复生命也轮回<br>
        天上挂着明亮的星<br>
        重复死亡但不归<br>
        短促的蜉蝣要嘶吼<br>
        海上仅有七座岛<br>
        奇迹与神秘<br>
        天予刍狗谁不受<br>
        悠长的岁月唱起歌<br>
        涓涓细雨洗落尘<br>
        炊烟直上九重天<br>
        一片荒林立孤坟
      </div>
    </div>
