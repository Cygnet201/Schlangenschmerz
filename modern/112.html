    <div class="poem-header">
      <h1>为什么不恨呢？</h1>
      <div class="date">2018.10.11</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        为什么不恨呢？<br>
        把沉重的苦难抛给我的世界<br>
        宇宙也冷眼旁观<br>
        那好吧，我做不到别的什么<br>
        只有深深深深的恨意<br>
        绵延万里<br>
        像藤蔓，像玫瑰，像天边的霞光<br>
        扎根，散发，照耀<br>
        脆弱而又坚强<br>
        再大的风霜，怎会磨平<br>
        岩石的棱角<br>
        我怎不敢把轻蔑的目光<br>
        投向皑皑雪茫茫<br>
        歌呀，怒吼啊！<br>
        希斯克利夫！
      </div>
    </div>
