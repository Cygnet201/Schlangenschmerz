<body>
  <div class="poem-page">
    <a href="../index.html" class="back-link">返回目录</a>
    <div class="poem-header">
      <h1>随感</h1>
      <div class="date">2025.4.24</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        海中有浪潮涌起<br>
        却不知往何处去<br>
        一生盲目<br>
        撞上礁石碎成白沫
      </div>

      <div class="stanza">
        山谷有树苗破土<br>
        直往天空<br>
        风吹雨打火烧雷击矢志不移<br>
        千年万年成一景
      </div>

      <div class="stanza">
        天上星辰像是眼睛<br>
        一闪一闪亮晶晶<br>
        一束光线那么长<br>
        摸不到头也找不到尾
      </div>

      <div class="stanza">
        哪里听不到海浪的声音<br>
        哪里看不见树木的枝叶<br>
        哪里躲得了星辰织成的网<br>
        哪里才能逃离时光？
      </div>
    </div>
