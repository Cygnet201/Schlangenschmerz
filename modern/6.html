    <div class="poem-header">
      <h1>回归</h1>
      <div class="date">2025.9.20</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我是一笔无人偿还的血腥债务<br>
        未来是一本永不消逝的无字账簿<br>
        过去宛如一根套在脖子上的幽灵绞索<br>
        等待着<br>
        有朝一日<br>
        仇恨点燃爱的柴火<br>
        死亡摆脱重力的触摸<br>
        天空中终于多了一颗永恒飘荡着的人头气球
      </div>
    </div>
