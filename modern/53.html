      <h1>路上车太多</h1>
      <div class="date">2020.10.26</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        路上车太多<br>
        亮起几百个红灯<br>
        水还在涨<br>
        我看见金鱼在窗外游荡<br>
        要么溺死<br>
        要么活亡<br>
        我费劲打开门<br>
        跟着泥沙前往深渊<br>
        在那里别的也没有<br>
        只是什么在不断死去<br>
        不断死去的意志<br>
        与永恒的肉体<br>
        唯有血液还在流动<br>
        当我不复存在<br>
        水已蒸干<br>
        还会有路<br>
        从森林和海洋<br>
        延伸出来
      </div>
    </div>
