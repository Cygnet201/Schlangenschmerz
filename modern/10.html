    <a href="../index.html" class="back-link">返回目录</a>
    <div class="poem-header">
      <h1>九歌·二</h1>
      <div class="date">2025.5.4</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        一面镜子中倒映着无数模糊不清的形象<br>
        有个声音切开朦胧说<br>
        这就是你<br>
        眼前顿时明白起来
      </div>

      <div class="stanza">
        我在词与句的锁链上跳舞<br>
        迎来盛大的狂喜<br>
        你于黑暗的夜中悄然逝去<br>
        期待一场永无可能的葬礼
      </div>

      <div class="stanza">
        留下来的空洞<br>
        是一个好了又开裂的疮疤<br>
        温暖的光<br>
        也渐渐冰凉
      </div>

      <div class="stanza">
        来吧<br>
        到血流不止的悬崖上俯瞰<br>
        这里的风景熟悉吗？<br>
        鸟儿像疯子一样追尾盘旋
      </div>

      <div class="stanza">
        硬化的痛苦沉积成了一座休眠火山<br>
        它也许喷发过<br>
        此时四周已变换沧海<br>
        静静地，慢慢地……<br>
        暴雨落下疾风吹拂<br>
        没有谁会记得
      </div>
    </div>
