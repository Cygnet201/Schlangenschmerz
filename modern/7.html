  <div class="poem-page">
    <a href="../index.html" class="back-link">返回目录</a>
    <div class="poem-header">
      <h1>童年、自我与无意识</h1>
      <div class="date">2025.7.20</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        一场酩酊大醉<br>
        让我倒在无意识的血泊中<br>
        这是心照不宣的谋杀<br>
        凶手藏在童年的屋檐下
      </div>

      <div class="stanza">
        谁有胆量抓住他？<br>
        谁手上没有滋养一朵恶之花？<br>
        悠长如瀑布的历史静静流淌<br>
        累累尸骨沥出镜子里幽暗的浮渣
      </div>
    </div>
