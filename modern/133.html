    <div class="poem-header">
      <h1>前方还有许多苦难</h1>
      <div class="date">2017.11.19</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        前方还有许多苦难<br>
        有十字架要担<br>
        诸多误解挤进来<br>
        盐已经失去了咸味<br>
        哽咽呼唤呵<br>
        隆隆作响的机器叹<br>
        甫一进门<br>
        所有诗全瘫痪<br>
        不该如此这般<br>
        却怪不得谁与谁<br>
        哪叫大提琴声嘶力竭地喊<br>
        弦断了
      </div>
    </div>
    <div class="feedback-section">
      <h3>留下你的评价</h3>

        <input type="hidden" name="entry.133248077" value="前方还有许多苦难">

          <input type="radio" name="entry.1288177946" id="star3" value="3" checked><label for="star3"></label>

  <script>
  function submitFeedback(e) {

      mode: 'no-cors',

      document.getElementById('feedbackMsg').style.display = 'block';
