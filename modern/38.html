<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>深夜让事件凝固 - 折樱诗集</title>
  <script>(function(){var s=localStorage.getItem('theme');if(s)document.documentElement.setAttribute('data-theme',s)})()</script>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" aria-label="切换主题"></button>
  <div class="poem-page">
    <a href="../index.html" class="back-link">返回目录</a>
    <div class="poem-header">
      <h1>深夜让事件凝固</h1>
      <div class="date">2021.9.9</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        深夜让事件凝固<br>
        隔断了声音<br>
        停止了流水<br>
        关上了天上的窗户<br>
        一场梦降临于此<br>
        思维<br>
        再一次称呼它自己为<br>
        我<br>
        我就像千万年前的王<br>
        坐在一架轰隆马车上<br>
        脚下滚过烛光般的太阳<br>
        我发号施令<br>
        让羲和在此停留<br>
        等待一个伟大的刺客<br>
        它会杀死我<br>
        留下一具可鄙的肉体<br>
        剩下的日子<br>
        将不会是日子
      </div>
    </div>
    <div class="feedback-section">
      <h3>留下你的评价</h3>

        <input type="hidden" name="entry.133248077" value="深夜让事件凝固">

  <script>
  function submitFeedback(e) {
    e.preventDefault();
    var form = document.getElementById('feedbackForm');
    var data = new URLSearchParams(new FormData(form));
    fetch('https://docs.google.com/forms/d/e/1FAIpQLSc3hdB_IxX3wFBLahVYqQSeWvqlrnERiASxdolsJQjntCa4fw/formResponse', {
      method: 'POST',
      mode: 'no-cors',
      headers: {'Content-Type': 'application/x-www-form-urlencoded'},
      body: data
    }).then(function() {
      form.style.display = 'none';
      document.getElementById('feedbackMsg').style.display = 'block';
    }).catch(function() {
      form.style.display = 'none';
      document.getElementById('feedbackMsg').style.display = 'block';
    });
    return false;
  }
  </script>
  <script>
(function() {
  var root = document.documentElement;
  var btn = document.getElementById('themeBtn');
  var saved = localStorage.getItem('theme');

  function isDark() {
    if (saved) return saved === 'dark';
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function apply() {
    if (saved) {
      root.setAttribute('data-theme', saved);
    } else {
      root.removeAttribute('data-theme');
    }
    btn.textContent = isDark() ? '\u2600' : '\u263D';
  }

  function toggleTheme() {
    var dark = isDark();
    saved = dark ? 'light' : 'dark';
    localStorage.setItem('theme', saved);
    apply();
  }

  window.toggleTheme = toggleTheme;
  apply();

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
    if (!localStorage.getItem('theme')) apply();
  });
})();
</script>
</body>
</html>
