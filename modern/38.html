      <h1>深夜让事件凝固</h1>
      <div class="date">2021.9.9</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        深夜让事件凝固<br>
        隔断了声音<br>
        停止了流水<br>
        关上了天上的窗户<br>
        一场梦降临于此<br>
        思维<br>
        再一次称呼它自己为<br>
        我<br>
        我就像千万年前的王<br>
        坐在一架轰隆马车上<br>
        脚下滚过烛光般的太阳<br>
        我发号施令<br>
        让羲和在此停留<br>
        等待一个伟大的刺客<br>
        它会杀死我<br>
        留下一具可鄙的肉体<br>
        剩下的日子<br>
        将不会是日子
      </div>
    </div>
