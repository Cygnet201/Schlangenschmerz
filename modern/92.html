    <div class="poem-header">
      <h1>梦幻的电子氤氲成气</h1>
      <div class="date">2019.6.21</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        梦幻的电子氤氲成气<br>
        比吗啡更像生命<br>
        高楼大厦鳞次栉比<br>
        仿佛烂进沼泽地<br>
        你说，你说<br>
        我在扮演听众的角色<br>
        上班的地铁终于停运<br>
        早饭洒进昨夜的雨<br>
        没人宽慰的人<br>
        我递给他一根Pocky
      </div>
    </div>
