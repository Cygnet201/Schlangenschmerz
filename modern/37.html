    <div class="poem-header">
      <h1>咏珠穆朗玛</h1>
      <div class="date">2021.9.22</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        天已缺<br>
        万顷银河水<br>
        浇灭千枚昏灯
      </div>

      <div class="stanza">
        小山无数座<br>
        皆作海底丘<br>
        唯余一嵯峨<br>
        听罢狂风披绿衣
      </div>
    </div>
