      <h1>像百足之虫</h1>
      <div class="date">2019.5.7</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        像百足之虫<br>
        囚犯整齐划一地移动<br>
        藤蔓成了我们的监工<br>
        它深深缠绕着<br>
        扎入所有人的脚踝<br>
        我想要驻足回看<br>
        藤刺撕烂脆弱的皮肤<br>
        让我无力偿还<br>
        前人留给后人的债<br>
        刺里的恶毒与善意<br>
        无从分辨<br>
        我只能跟着看走在前面的人<br>
        背影在烈日下摇摆<br>
        恍惚有梦<br>
        恍惚有钟楼
      </div>
    </div>
