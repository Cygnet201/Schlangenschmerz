    <div class="poem-header">
      <h1>夜晚也还没有星辰</h1>
      <div class="date">2018.11.12</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        夜晚也还没有星辰<br>
        漆黑小路上还有单身汉<br>
        影子里怀念童真<br>
        耷拉着手、背也佝偻<br>
        现实的大厦压在心头<br>
        北风吹起遍地黄沙<br>
        金色荡漾有如荣华<br>
        月球高挂于太空之上<br>
        一片荒漠中找不到它<br>
        慢慢地，灯亮了<br>
        天空所有的星<br>
        天空所有的灯<br>
        漆黑小巷点起雪茄<br>
        露出城市熟悉的、陌生的脸<br>
        太迷人了，陈年老酒有味道<br>
        够烈，神魂也好颠倒<br>
        撞上去祖祖辈辈千千万万的人<br>
        就这样埋葬在风中<br>
        等待天上的月亮照见他们<br>
        看他们有颗怎样空虚的心
      </div>
    </div>
