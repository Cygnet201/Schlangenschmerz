    <div class="poem-header">
      <h1>在比邻的屏幕亮光之外</h1>
      <div class="date">2020.9.23</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        在比邻的屏幕亮光之外<br>
        人心的暗沉被遮盖<br>
        所有精致的都如围城<br>
        正裹挟着我<br>
        裹挟着时代
      </div>
    </div>
