      <h1>随笔</h1>
      <div class="date">2016.12.11</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        追寻自由的我们<br>
        把我囚禁于巴士底狱<br>
        剧作家写了好或不好的剧本<br>
        让天才和庸人各得角色<br>
        赖谎言以为生<br>
        却向真理求死<br>
        生活通常不尽如人意<br>
        人何尝如生活之意呢<br>
        百股愁肠千般抱怨<br>
        倒还像个人样<br>
        现代许多人笑得不堪<br>
        覆巢之下无完卵<br>
        巫山云雨迟不就<br>
        早负襄王筑楚台<br>
        路旁歇脚处<br>
        不识一株草
      </div>
    </div>
