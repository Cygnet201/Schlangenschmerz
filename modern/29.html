    <div class="poem-header">
      <h1>城市</h1>
      <div class="date">2021.12.17</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        城市<br>
        一座伟大的猪圈<br>
        在它涂满粪便的街道上<br>
        扬起掺杂着尿素的尘埃<br>
        它架在深渊之上<br>
        犹如山峰架设在一粒沙之上<br>
        原是为了远离地底<br>
        本来，是要建成一座纪念碑似的高塔<br>
        然而太阳被幽邃的水一样的空气扭曲了<br>
        从旧小区防盗栏里流出的<br>
        再也不是一道道温暖的微光<br>
        而是腐烂的、发臭的、粘稠的尸水<br>
        我该怎么生存？<br>
        蜷曲着、蠕动着，像只年幼的苍蝇<br>
        或许是回忆里还有些不能被擦去的影像<br>
        或许是胸中的火焰还是无法冷却成一块坚冰<br>
        我恍惚中看见一场大火<br>
        一场烧了九天的火<br>
        有多少虫子被当作柴薪啊<br>
        他们终于死得其所
      </div>
    </div>
