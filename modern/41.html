      <h1>我们终将回归</h1>
      <div class="date">2021.6.28</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我们终将回归<br>
        母亲温暖的怀抱<br>
        如江河流进海底<br>
        像朝拜一位失落的神明<br>
        在此之前<br>
        有太多的伪神窃取了浮浪<br>
        它们冲天的虚影仿佛一出天地歌剧<br>
        就在轰鸣的十字之岛<br>
        大地自愿领受了这场仪式的绞刑<br>
        我们是海的犯了错的孩子<br>
        要在干涸的陆地上呼吸<br>
        每一次呼吸<br>
        都是对故乡的思念<br>
        在醒时<br>
        我们想念闪闪发光的金钱<br>
        说着已经失效的语言<br>
        在梦里<br>
        我们嘟囔、闭眼、三昧<br>
        海里没有光与影<br>
        海底没有声和色<br>
        这景象已经被忘记
      </div>
    </div>
