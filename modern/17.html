<body>
  <div class="poem-page">
    <a href="../index.html" class="back-link">返回目录</a>
    <div class="poem-header">
      <h1>多么</h1>
      <div class="date">2024.12.30</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        多么无聊的生活<br>
        多么精彩的赛博<br>
        多么动人的故事<br>
        多么丰富的选择<br>
        在轻柔的雨声中<br>
        与她在余生里相遇相知相互折磨<br>
        每一次亲吻的瞬间<br>
        她的面孔变换莫测<br>
        是什么在跳动<br>
        千万盏灯火<br>
        只是明晃晃哀愁
      </div>
    </div>
