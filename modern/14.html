    <div class="poem-header">
      <h1>在乎</h1>
      <div class="date">2025.2.16</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        你还在乎什么呢？<br>
        爱、死亡与面包<br>
        月亮想你的时候<br>
        你爱着湖水中发光的倒影<br>
        白马践踏大地的时候<br>
        你眼睁睁看见血从生命中滴落<br>
        喃喃自语<br>
        无能为力<br>
        只好蜷缩在一片废墟中<br>
        啃着尸体上长出的面包<br>
        爱你啊<br>
        死亡亲吻你的脸颊<br>
        时间赦免了你的冤罪<br>
        独自一人<br>
        遥望触手可及的终点<br>
        太阳领着你绕了很远很远
      </div>
    </div>
