    <div class="poem-header">
      <h1>断掉的铁轨</h1>
      <div class="date">2018.11.22</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        断掉的铁轨<br>
        横跨九百六十万沙砾<br>
        狂风曾一次次将之埋葬<br>
        又一次次使它重见天日<br>
        长生如冥灵老树<br>
        学得八千年春秋<br>
        而火还不曾有人带到地上<br>
        只闻天上滚滚雷声<br>
        扯不出一个闪<br>
        望啊望，盼啊盼<br>
        有时跟着河走<br>
        有时跟着风走<br>
        夜里大家都睡了<br>
        谁还见过星斗？<br>
        一场梦，一场空<br>
        剧本飘散在风中<br>
        高声念出它的人<br>
        来到了座座铁屋前<br>
        他吼叫，他呐喊<br>
        他于黎明下长眠<br>
        回顾沙漠，<br>
        看看绿洲外的千疮百孔<br>
        以沉默，以哀恸<br>
        悼念青天不日中<br>
        颓唐夜从容
      </div>
    </div>
