      <h1>黑夜里没有灯火</h1>
      <div class="date">2020.4.2</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        黑夜里没有灯火<br>
        渔村熄灭了最后的余晖<br>
        然而宁静同时远去<br>
        丑恶的戏剧将时时上演<br>
        不分悲喜唯有疯癫<br>
        他们走在时间的影子里<br>
        脸上洋溢身处世界中心的笑容<br>
        尽管衣着褴褛<br>
        也要一掷千金<br>
        音乐厅听见克罗采奏鸣曲<br>
        死亡的脚步于此暂停<br>
        趁现在朗诵一句浮士德<br>
        穿行于白昼的主<br>
        祂来，祂见，祂征服
      </div>
    </div>
