    <div class="poem-header">
      <h1>也许我喜新厌旧</h1>
      <div class="date">2018.2.18</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        也许我喜新厌旧<br>
        已经厌倦了人生<br>
        想化作乌鸦<br>
        抬眼自然暮色苍茫<br>
        可莫名有种不舍<br>
        为这躯壳抚开恶魔<br>
        是谁的眼眸<br>
        温情脉脉<br>
        是谁的双手<br>
        粗糙有力<br>
        是谁的耳鬓<br>
        令人垂怜<br>
        他们在挽留我吗<br>
        还是无垠星空中<br>
        昭昭煌煌<br>
        未知神秘<br>
        在编织幻梦境<br>
        还是我自己<br>
        无法让我消失于<br>
        我之中<br>
        就像水在水中<br>
        也无法死去一样<br>
        永恒的疑问由永恒回答<br>
        蜉蝣哪怕挣扎<br>
        也只能引吭高歌
      </div>
    </div>
