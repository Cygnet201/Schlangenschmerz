  <div class="poem-page">

    <div class="poem-header">
      <h1>某刻</h1>
      <div class="date">2016.12.11</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        梦里的小时候<br>
        曾多少次成为英雄<br>
        特意勾起嘴角<br>
        无数高墙嘲讽
      </div>

      <div class="stanza">
        片刻烟消<br>
        彼处已是不归尘的楼<br>
        此梦无数<br>
        次次如故
      </div>

      <div class="stanza">
        渐渐迷蒙<br>
        变得像梦<br>
        主角换成了<br>
        英雄的影子
      </div>

      <div class="stanza">
        注视着照旧笔直<br>
        盛夏午后的脊梁<br>
        又是无数<br>
        次次如故
      </div>

      <div class="stanza">
        亦步亦趋<br>
        做他背影<br>
        吻过无垠的水泥后<br>
        他留我于梦中
      </div>
    </div>
