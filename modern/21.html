<body>
  <div class="poem-page">
    <a href="../index.html" class="back-link">返回目录</a>
    <div class="poem-header">
      <h1>起在新西兰的一场风</h1>
      <div class="date">2022.7.5</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        起在新西兰的一场风<br>
        也不耽误我午睡<br>
        天上吹的小雨点<br>
        热得像草莓
      </div>

      <div class="stanza">
        为什么你还在寻找<br>
        一无所有的无畏<br>
        空中悬挂的太阳<br>
        巴望着地上生邪鬼
      </div>

      <div class="stanza">
        生呀死呀<br>
        草原之上万马齐喑哑<br>
        跪呀拜呀<br>
        海浪拍在发胀的脸颊
      </div>

      <div class="stanza">
        悲哀吗<br>
        在心中永远有波涛<br>
        不明白<br>
        世界为何这么奇妙
      </div>

      <div class="stanza">
        再也不能哭着喊着<br>
        叫妈妈<br>
        板起面孔<br>
        做人啊
      </div>
    </div>
