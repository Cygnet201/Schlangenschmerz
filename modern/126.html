    <div class="poem-header">
      <h1>无垠夜色</h1>
      <div class="date">2018.3.9</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        远去了，灯塔上的无垠夜色<br>
        外面传来马车声声<br>
        陪伴守夜人安然入梦<br>
        长长的不褪色的夜<br>
        无数星尘诵唱诗歌<br>
        透过浓雾看向陌生港湾<br>
        总等不到一艘出海的船
      </div>
    </div>
