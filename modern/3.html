    <div class="poem-header">
      <h1>喜宴</h1>
      <div class="date">2026.1.31</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        路过镇上最好的酒店<br>
        发现有人在这里办了喜宴<br>
        新人的名字写在路牌上<br>
        向过往的旅客发布告示<br>
        普天之下纷纷扰扰<br>
        鞭炮响彻云霄<br>
        一个人躲在冬日里实在无处可去<br>
        不如缩进被窝龙盘虎踞<br>
        等待春天来临<br>
        宛如在列车站台即将分隔千里<br>
        却要费劲追逐时间的<br>
        热恋情侣
      </div>
    </div>
