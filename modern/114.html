    <div class="poem-header">
      <h1>苦上结出美丽的花</h1>
      <div class="date">2018.10.9</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        苦上结出美丽的花<br>
        那是幻象<br>
        唯其是假的<br>
        碎裂时才好过真实<br>
        平静不会降临<br>
        追求永无止境<br>
        要在绝望处绝望<br>
        在希望时希望<br>
        谁知道自己想要什么？<br>
        回归吧<br>
        作为迷途的雁<br>
        停留必有烟霞
      </div>
    </div>
