      <h1>在乱糟糟的睡前</h1>
      <div class="date">2019.7.15</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        在乱糟糟的睡前<br>
        能否给我一线光明<br>
        梦化作奔马<br>
        是怀揣信件的邮差<br>
        天人五衰<br>
        一声长鸣
      </div>
    </div>
