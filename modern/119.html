      <h1>走出花园</h1>
      <div class="date">2018.7.14</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        走出花园<br>
        来到荆棘密布的海岸<br>
        空有路标<br>
        乌鸦恶毒地凝视陌生人<br>
        从某处飘出绿色毒气<br>
        把淤泥染成梦幻的彩虹<br>
        我贪恋花的清香<br>
        时不时回头望<br>
        明知已是妄想<br>
        荆棘趁机绊倒了我<br>
        卑鄙的刺扎进骨髓<br>
        我竟欢喜莫名<br>
        心上痛苦眼下泪珠<br>
        天下起小雨<br>
        经过一处坟地<br>
        幽魂向我耳语<br>
        回头吧<br>
        前方无不虚幻<br>
        回头吧<br>
        宁静唯有彼岸<br>
        伤口隐隐作痛<br>
        恍惚梦中<br>
        仍有细雨朦胧<br>
        没有花园<br>
        只是口中咸味像盐
      </div>
