      <h1>梦别山</h1>
      <div class="date">2021.9.9</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        一个梦是一条船<br>
        故乡有千万块礁石<br>
        石头里有鬼门关<br>
        撞啊撞<br>
        船在海上摇摇晃<br>
        看那五彩的泡沫<br>
        死了的在空中<br>
        梦别山
      </div>
    </div>
