    <div class="poem-header">
      <h1>尊严</h1>
      <div class="date">2022.7.5</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        疾风骤雨<br>
        掀起地上万千穹庐<br>
        蜜的江河<br>
        牛奶的湖泊<br>
        晒成贝壳珊瑚
      </div>

      <div class="stanza">
        我失去了家园<br>
        乡间小路泥泞不见<br>
        玉米粱养育的脊梁<br>
        被收割机卷进轱辘<br>
        一茬一茬像纺线
      </div>

      <div class="stanza">
        那是金子的乳酪<br>
        那是泪水的马膘<br>
        竖起千重楼万重厦<br>
        压在苦涩如春的大地上
      </div>

      <div class="stanza">
        我不言语<br>
        天下四处飞雪泥<br>
        破碎的花朵像顽石<br>
        将其收集<br>
        搓揉、磨碾<br>
        那铸成的人雕像是空的<br>
        风一吹就倒
      </div>

      <div class="stanza">
        我不语言<br>
        天上飘来深深的云<br>
        撒下腐烂的金丝线<br>
        将其收集<br>
        搓揉、磨碾<br>
        那浇成的神雕像是实的<br>
        如一颗永恒的太阳
      </div>
    </div>
