    <div class="poem-header">
      <h1>远去吧</h1>
      <div class="date">2021.9.27</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        远去吧<br>
        那些青山绿水<br>
        远去吧<br>
        浮现着黄金重量的光辉<br>
        坠入一条永无止境的河流<br>
        这条河流里全是沙漏<br>
        无知无畏的人<br>
        锁在那条漏下沙子的缝隙里<br>
        呼——吸——<br>
        自如地呼吸！<br>
        他透过玻璃看见的<br>
        偏转了的射线<br>
        难道不是完美的、一个超越性的圆？<br>
        对于这个圆来说<br>
        什么是更好<br>
        什么是更坏<br>
        对于衔尾蛇来说<br>
        什么是头<br>
        什么是尾<br>
        全然不需要关心<br>
        需要关心的是沙子<br>
        每一粒沙子<br>
        一粒一粒<br>
        便是死了<br>
        也不会长出子粒来
      </div>
    </div>
