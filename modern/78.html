    <div class="poem-header">
      <h1>将目光放在眼前的池塘</h1>
      <div class="date">2019.11.15</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        将目光放在眼前的池塘<br>
        水和水不分彼此<br>
        我不可能成为我们<br>
        只会升腾化雨<br>
        落入火山之中
      </div>
    </div>
