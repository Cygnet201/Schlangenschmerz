      <h1>夏日阴影中的风</h1>
      <div class="date">2019.7.12</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        夏日阴影中的风<br>
        卷在窗帘下<br>
        带来一场霜冻<br>
        驱逐太阳凯旋的余威<br>
        要跨越阿尔卑斯吗
      </div>
    </div>
