<!DOCTYPE html>

<head>

  <script>(function(){var s=localStorage.getItem('theme');if(s)document.documentElement.setAttribute('data-theme',s)})()</script>
  <link rel="stylesheet" href="https://unpkg.com/@waline/client@v3/dist/waline.css">
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn" aria-label="切换主题"></button>
  <div class="poem-page">
    <a href="../index.html" class="back-link">返回目录</a>
    <div class="poem-header">
      <h1>随笔</h1>
      <div class="date">2016.12.11</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        追寻自由的我们<br>
        把我囚禁于巴士底狱<br>
        剧作家写了好或不好的剧本<br>
        让天才和庸人各得角色<br>
        赖谎言以为生<br>
        却向真理求死<br>
        生活通常不尽如人意<br>
        人何尝如生活之意呢<br>
        百股愁肠千般抱怨<br>
        倒还像个人样<br>
        现代许多人笑得不堪<br>
        覆巢之下无完卵<br>
        巫山云雨迟不就<br>
        早负襄王筑楚台<br>
        路旁歇脚处<br>
        不识一株草
      </div>
    </div>
    <div class="feedback-section">
      <h3>留下你的评价</h3>
      <div class="rating-stats" id="ratingStats"></div>
      <div class="rating-group" id="ratingGroup">
        <input type="radio" name="rating" id="s10" value="10"><label for="s10" class="full"></label>
        <input type="radio" name="rating" id="s9"  value="9"><label for="s9"  class="half"></label>
        <input type="radio" name="rating" id="s8"  value="8"><label for="s8"  class="full"></label>
        <input type="radio" name="rating" id="s7"  value="7"><label for="s7"  class="half"></label>
        <input type="radio" name="rating" id="s6"  value="6"><label for="s6"  class="full"></label>
        <input type="radio" name="rating" id="s5"  value="5"><label for="s5"  class="half"></label>
        <input type="radio" name="rating" id="s4"  value="4"><label for="s4"  class="full"></label>
        <input type="radio" name="rating" id="s3"  value="3"><label for="s3"  class="half"></label>
        <input type="radio" name="rating" id="s2"  value="2"><label for="s2"  class="full"></label>
        <input type="radio" name="rating" id="s1"  value="1"><label for="s1"  class="half"></label>

    <nav class="poem-nav">
      <a href="../index.html">返回目录</a>
    </nav>
  </div>
  <script>
  (function() {
    var RATING_API = 'https://poetry201.netlify.app/.netlify/functions/rating';
    var poem = window.location.pathname;

    function getWalineUser() {
      try { return JSON.parse(localStorage.getItem('WALINE_USER')); }
      catch(e) { return null; }
    }

    function renderStats(d) {
      if (!d || d.count === 0) { document.getElementById('ratingStats').innerHTML = ''; return; }
      var v = d.avg / 2, stars = '', full = Math.floor(v), half = v - full >= 0.25;
      for (var i = 0; i < full; i++) stars += '★';
      if (half) stars += '☆';
      document.getElementById('ratingStats').innerHTML =
        '<span class="stats-stars">' + stars + '</span> ' +
        '<span class="stats-avg">' + d.avg + '</span>' +
        '<span class="stats-count">' + d.count + ' 人评分</span>';
    }

    var user = getWalineUser();
    var token = user ? user.token : null;
    var fetchHeaders = {};
    if (token) fetchHeaders['Authorization'] = 'Bearer ' + token;

    fetch(RATING_API + '?poem=' + encodeURIComponent(poem), { headers: fetchHeaders })
      .then(function(r) { return r.json(); })
      .then(function(d) {
        renderStats(d);
        if (d.userScore) {
          var el = document.getElementById('s' + d.userScore);
          if (el) el.checked = true;
        }
      }).catch(function() {});

    if (!token) {
      document.getElementById('feedbackMsg').innerHTML = '请先在下方评论区登录后评分';
      document.getElementById('feedbackMsg').style.display = 'block';
      var inputs = document.querySelectorAll('#ratingGroup input');
      for (var i = 0; i < inputs.length; i++) inputs[i].disabled = true;
      return;
    }

    var radios = document.querySelectorAll('#ratingGroup input[name="rating"]');
    for (var j = 0; j < radios.length; j++) {
      radios[j].addEventListener('change', function() {
        var score = parseInt(this.value);
        fetch(RATING_API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ poem: poem, score: score })
        })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          renderStats(d);
          var msg = document.getElementById('feedbackMsg');
          msg.textContent = '评分已保存';
          msg.style.display = 'block';
          setTimeout(function() { msg.style.display = 'none'; }, 2000);
        });
      });
    }
  })();
  </script>
  <script>
(function() {
  var root = document.documentElement;
  var btn = document.getElementById('themeBtn');
  var saved = localStorage.getItem('theme');

  function isDark() {
    if (saved) return saved === 'dark';
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function apply() {
    if (saved) {
      root.setAttribute('data-theme', saved);
    } else {
      root.removeAttribute('data-theme');
    }
    btn.textContent = isDark() ? '\u2600' : '\u263D';
  }

  function toggleTheme() {
    var dark = isDark();
    saved = dark ? 'light' : 'dark';
    localStorage.setItem('theme', saved);
    apply();
  }

  window.toggleTheme = toggleTheme;
  apply();

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
    if (!localStorage.getItem('theme')) apply();
  });
})();
</script>
  <script type="module">
    import { init } from 'https://unpkg.com/@waline/client@v3/dist/waline.js';
    init({
      el: '#waline',
      serverURL: 'https://poetry201.netlify.app/.netlify/functions/comment',
      path: window.location.pathname,
      lang: 'zh-CN',
      requiredMeta: ['nick'],
      placeholder: '写下你的感想…',
    });
  </script>
</body>
