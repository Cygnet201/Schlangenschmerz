      <h1>案头琐事不会没完没了</h1>
      <div class="date">2019.6.28</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        案头琐事不会没完没了<br>
        大雨倾盆屏幕亮起<br>
        带来不幸的消息<br>
        你有一场会议<br>
        在准噶尔高地<br>
        提示音之后才传入耳朵<br>
        如电闪雷鸣阵阵心悸<br>
        冰雪之中童年和成人<br>
        在山的两边<br>
        一座失修的桥悄然塌陷
      </div>
    </div>
