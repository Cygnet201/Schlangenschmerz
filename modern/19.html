    <div class="poem-header">
      <h1>遮蔽</h1>
      <div class="date">2024.12.8</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        在夜晚暗自神伤的驽马<br>
        不曾拥有过白天<br>
        与苍穹接壤的海岸上<br>
        少年少女越过死亡<br>
        飞啊<br>
        鸟儿翻过山翻过海<br>
        却没有翻过天空<br>
        何处是出口<br>
        漫漫长路寂无声<br>
        万物亮如灯
      </div>
    </div>
