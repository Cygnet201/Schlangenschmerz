      <div class="date">2017.12.10</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        拉无辜路人作观众<br>
        落魄演员才不落魄<br>
        不是更显得落魄么<br>
        观众只好一路落魄
      </div>
