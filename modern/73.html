      <h1>航向拜占庭</h1>
      <div class="date">2019.12.17</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        正确的路会延伸出千万座罗马<br>
        顺流而下的船开往无数个远方<br>
        谁会在意海的颜色<br>
        心跳随浪起伏<br>
        夜晚点燃岛屿<br>
        再也没有象征
      </div>
    </div>
