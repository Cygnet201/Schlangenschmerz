    <div class="poem-header">
      <h1>不愿合眼的夜</h1>
      <div class="date">2019.9.16</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        不愿合眼的夜<br>
        灵魂背叛躯壳<br>
        为什么面对死亡<br>
        生命无可直视<br>
        谁能傲然挺立<br>
        谁将逆流而上<br>
        在海浪上建一座城堡<br>
        与历史的巨轮狠狠相撞<br>
        两者皆如沙散<br>
        漂泊竞似浮影
      </div>
    </div>
