    <div class="poem-header">
      <h1>生存</h1>
      <div class="date">2018.8.25</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我的所有浪漫，都在现实面前黯然失色。<br>
        生存，终究还是一个永恒的问题。<br>
        我为那些失去的可能性而哭泣，<br>
        我为那些多彩的道路而失声！<br>
        若是永生降临，会是更好的时代吗？<br>
        我该向谁发问？<br>
        一切都在夜里归于沉寂。<br>
        太阳依旧升起。
      </div>
    </div>
