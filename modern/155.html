    <div class="poem-header">
      <h1>镜中之友</h1>
      <div class="date">2016.12.11</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        这世界不对称<br>
        所以镜子中的影<br>
        总不顺心
      </div>

      <div class="stanza">
        要他哭<br>
        他就哭<br>
        要他笑<br>
        他就笑
      </div>

      <div class="stanza">
        我恨这个朋友<br>
        好长时间都不见他<br>
        有天下午<br>
        偶然在浊流中一瞥
      </div>

      <div class="stanza">
        他已换了模样<br>
        不笑也不哭<br>
        他做回他自己<br>
        我却失落了
      </div>
    </div>
