      <h1>一匹疲惫的奔马</h1>
      <div class="date">2020.2.17</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        一匹疲惫的奔马<br>
        以为前方就是草原<br>
        身上马镫还有<br>
        不时袭来的马刺<br>
        要把这朵未来的玫瑰<br>
        狠狠践踏<br>
        那人只是对待圣物似的<br>
        注意手中的权杖<br>
        哒哒声<br>
        仿若奔马的叹息<br>
        亦如天人五衰之前奏<br>
        悠久、悠长
      </div>
    </div>
