    <div class="poem-header">
      <h1>夜晚是一剂失效的安眠药</h1>
      <div class="date">2025.6.27</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        夜晚是一剂失效的安眠药<br>
        吞下以后<br>
        眼前浮现出的是<br>
        房间里昏黄的残影和她去了远方的<br>
        潮汐的声音
      </div>

      <div class="stanza">
        窗外<br>
        我看见云层中呕出的圆月<br>
        还有自己倒映在玻璃上的脸<br>
        憔悴、冷漠<br>
        只是一道无法落泪的光
      </div>
    </div>
