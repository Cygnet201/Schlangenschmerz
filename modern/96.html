<body>
  <div class="poem-page">
    <a href="../index.html" class="back-link">返回目录</a>
    <div class="poem-header">
      <h1>庸碌</h1>
      <div class="date">2019.5.7</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我正在慢性死亡<br>
        陈腐的大脑、朽坏的躯壳<br>
        同时宣告<br>
        我将无缘一切美好
      </div>

      <div class="stanza">
        悲伤已经过去<br>
        船只到了暗礁密布的海域<br>
        头上天空总下着阴雨<br>
        歌声里颤音夹杂战栗
      </div>

      <div class="stanza">
        旋转中无比芜杂的思绪<br>
        死亡吗？重生吗？<br>
        那是留给英雄的两项权力<br>
        庸碌常常海底观影！
      </div>

      <div class="stanza">
        不是反抗、也没有哀鸣，<br>
        沉默：唯一的声音<br>
        比虚无更为可怕的<br>
        一切为假的真
      </div>

      <div class="stanza">
        把魂推向深渊中的深渊<br>
        黑暗中的黑暗<br>
        还要为这些牺牲的灵<br>
        唱一曲最高昂的咏叹
      </div>

      <div class="stanza">
        为我洒一壶酒，<br>
        若是某天我从角落里<br>
        做出牺牲的样子<br>
        请原谅他，屈服于身
      </div>
    </div>
