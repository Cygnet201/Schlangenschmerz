    <div class="poem-header">
      <h1>清晨</h1>
      <div class="date">2025.1.13</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我看见死亡的微光<br>
        我听到禁令在哀嚎<br>
        我闻着生命的酒香<br>
        我触及蜿蜒的迷茫<br>
        未来是一面无影的镜子<br>
        尽头没有故乡<br>
        夜晚的天空中有千万朵发光的香花<br>
        芬芳穿透帷幕<br>
        心脏宛如风铃和鸣<br>
        无言的悲伤成为海洋<br>
        爱呀恨呀冷漠呀<br>
        完美静止之灵抚摸我洁白无暇的肌肤<br>
        却留下一处无法消除的流脓疮疤
      </div>
    </div>
