    <div class="poem-header">
      <h1>高楼大厦装饰了土地</h1>
      <div class="date">2021.10.9</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        高楼大厦装饰了土地<br>
        玻璃由此装饰了文明<br>
        形象因而装饰了双目<br>
        地球成了宇宙的灯球<br>
        月亮的背面一片荒漠<br>
        在这片丰饶之海上<br>
        我乘着太空中突起的晚风<br>
        用一束来自太阳的霞光<br>
        击碎了傲慢的弹珠<br>
        它的碎片化作了血肉<br>
        生命终于挣出外壳<br>
        也失去了永恒故乡<br>
        之后再也填不满乡愁<br>
        七重历史<br>
        重重皆如此
      </div>
    </div>
