      <h1>在夜里点燃神火</h1>
      <div class="date">2018.4.23</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        在夜里点燃神火<br>
        照亮每一个自我<br>
        在黎明保持缄默<br>
        不要让自己蒙羞
      </div>
