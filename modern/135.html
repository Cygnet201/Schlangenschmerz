      <h1>拿起名为道德的蛋糕</h1>
      <div class="date">2017.10.30</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        拿起名为道德的蛋糕<br>
        啊——祝你生日快乐<br>
        果真张开了嘴<br>
        仿佛蛋糕真美味似的
      </div>
