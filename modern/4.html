    <div class="poem-header">
      <h1>我们终究会渐行渐远</h1>
      <div class="date">2025.12.15</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        我们终究会渐行渐远<br>
        因为生命是无数条永不<br>
        相交的直线
      </div>

      <div class="stanza">
        我们终究会尽头相见<br>
        因为生命是无数朵飞向<br>
        自我的水仙
      </div>

      <div class="stanza">
        我们终究会遗忘一切<br>
        因为生命是无数只停在<br>
        墓上的蝴蝶
      </div>

      <div class="stanza">
        亲吻万物变换的模样<br>
        在那个瞬间<br>
        和永恒成为一对<br>
        相互背叛的眷侣
      </div>
    </div>
