    <div class="poem-header">
      <h1>不必了</h1>
      <div class="date">2018.5.27</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        不必了<br>
        我已决意启程<br>
        碧蓝天空染昏黄<br>
        日渐寂静的街上<br>
        行李箱轻快地响<br>
        再见了<br>
        我已决意启程<br>
        向着夜的彼方
      </div>
    </div>
