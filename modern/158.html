    <div class="poem-header">
      <h1>解</h1>
      <div class="date">2016.12.11</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        当我还是位学生时<br>
        在数学试卷题下这样的诗<br>
        真理她躲在镜子里<br>
        天才照镜时才现形<br>
        就写在最后一道题下面<br>
        解字也忘记
      </div>

      <div class="stanza">
        我就这样在数学家门口转了转<br>
        又回到别的道上<br>
        两手空空<br>
        给文学家的信已投递了<br>
        还剩下一个去处——<br>
        他住在海边（太远了）<br>
        我折了回去
      </div>

      <div class="stanza">
        可能还不到三米<br>
        前面槭树的影又让我回心转意<br>
        还是去吧<br>
        于是和还在影子里说<br>
        荒诞故事（隐约听到法官云云）的陀思妥耶夫斯基<br>
        和不断速记的她道别
      </div>

      <div class="stanza">
        恰好这时<br>
        被乌云遮蔽已久的太阳出来了<br>
        我拿起被丢在一旁的卷子<br>
        不知海边的沉思者会写解吗
      </div>
    </div>
