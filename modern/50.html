    <div class="poem-header">
      <h1>现实投下巨大的阴影</h1>
      <div class="date">2021.3.14</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        现实投下巨大的阴影<br>
        曾以为那是夜空<br>
        上面缀满理想的星<br>
        人们搅碎了阴影<br>
        人们摔碎了行星<br>
        夜幕终会燃烧<br>
        猫与狗<br>
        祖宗与孙子<br>
        夜幕终会燃烧<br>
        猫的主人<br>
        狗的主人<br>
        孙子与祖宗<br>
        他们终会燃烧
      </div>
    </div>
