      <h1>煤灰</h1>
      <div class="date">2017.5.23</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        工厂的烟囱冒出浓浓黑烟<br>
        那是工人脑中的煤在反抗火焰<br>
        这一支无人指挥的反抗军<br>
        正在不知不觉间<br>
        走向命中注定的长平<br>
        成为火堆下熊熊燃烧的柴薪<br>
        而余灰即为所求<br>
        它们自傲地落入尘中<br>
        如此虽死犹生
      </div>
    </div>
