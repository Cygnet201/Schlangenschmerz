<body>
  <div class="poem-page">
    <a href="../index.html" class="back-link">返回目录</a>
    <div class="poem-header">
      <h1>金羽鸟</h1>
      <div class="date">2026.3.29</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        金羽鸟 金羽鸟<br>
        东居九州 南面群岛<br>
        不知天下大如许<br>
        衔走河石作望舒
      </div>

      <div class="stanza">
        金羽鸟 金羽鸟<br>
        西临沙海 北巡云霄<br>
        不知天下大如许<br>
        衔走黑麦作禾黍
      </div>

      <div class="stanza">
        金羽鸟 金羽鸟<br>
        何处梧桐栖凤凰？<br>
        不知天下大如许<br>
        山有灵兮地不王
      </div>
    </div>
