      <h1>解形篇</h1>
      <div class="date">2025.9.30</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        生当斩断命如网，却陷红尘夜凝霜。<br>
        诸般傀儡噬性灵，求仙拜佛无星光。<br>
        千言万语奔似瀑，九重天上清静处。<br>
        削出念头食玄牡，此身落去留不住。
      </div>
    </div>
