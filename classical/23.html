      <h1>江岸</h1>
      <div class="date">2018.3.7</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        两岸华灯初照水，喧嚣直到明月弯。<br>
        夜半渔船远行客，问到生死指河山。
      </div>
