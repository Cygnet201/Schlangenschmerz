    <div class="poem-header">
      <h1>望太行</h1>
      <div class="date">2018.6.10</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        遥望太行雪满山，长夜凛风动乌帆。<br>
        早岁曾言登绝顶，艰难世事往回看。<br>
        高楼林立栖何处，广厦万间问家寒。<br>
        天下欢颜总一色，零落孤影别万般。
      </div>
    </div>
