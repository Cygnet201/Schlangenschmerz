    <div class="poem-header">
      <h1>章台</h1>
      <div class="date">2026.1.17</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        章台神女去复来，旧人出嫁客徘徊，新伶歌声喜胜哀。<br>
        为博笑颜动细腰，金樽清酒尽欢消，光阴磨断凤凰箫。<br>
        北里劫火万楼空，行院再起千柱红，听得天外有晨钟。<br>
        往事流转又相逢。
      </div>
    </div>
