      <h1>雾中行船</h1>
      <div class="date">2018.5.17</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        雾中夜行船，红烛白月光。<br>
        岸上渔歌子，挥去海茫茫。<br>
        江面无数点，催舟向远方。<br>
        纵使骄阳在，诗酒仍悠长。
      </div>
    </div>
