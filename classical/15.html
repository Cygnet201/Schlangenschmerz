    <div class="poem-header">
      <h1>竹花</h1>
      <div class="date">2019.8.10</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        言语尽处意生根，独望长夜对无人。<br>
        心上秋风总萧瑟，但使竹花不过门。
      </div>
