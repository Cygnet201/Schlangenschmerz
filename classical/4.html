      <h1>生死</h1>
      <div class="date">2024.11.20</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        天上清辉照新坟，竹林阴影落旧人。<br>
        千年万载风和雨，吹散世间土与尘。
      </div>
