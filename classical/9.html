    <div class="poem-header">
      <h1>礼</h1>
      <div class="date">2019.12.24</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        只可与之礼，不可与之居。<br>
        礼有天长久，居无一日虚。<br>
        此间人去来，闻道分朝夕。<br>
        东坡醒复醉，江海小舟依。
      </div>
    </div>
