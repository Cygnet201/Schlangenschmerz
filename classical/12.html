      <h1>暖阳</h1>
      <div class="date">2019.10.24</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        暖阳清风略暗居，青烟迷雾据东西。<br>
        峭壁寒石语乔木，亭台久立舞云旗。
      </div>
