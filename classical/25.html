      <h1>糊涂</h1>
      <div class="date">2018.2.12</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        无人可说不道破，难得糊涂又如何。<br>
        一场春雨一场梦，终究人间难再得。
      </div>
