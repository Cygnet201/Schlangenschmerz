    <div class="poem-header">
      <h1>入夜</h1>
      <div class="date">2019.10.8</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        一夜梦里多不还，火烧千言烬落盘。<br>
        草木初黄愁白日，槁灰何时能复燃。<br>
        三更细雨敲深谷，九重寒窗锁清潭。<br>
        劳心苦熬任飞光，云天眉目画如蓝。
      </div>
    </div>
