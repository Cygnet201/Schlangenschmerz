    <div class="poem-header">
      <h1>出函谷</h1>
      <div class="date">2020.1.15</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        安步出函谷，雪山敲腑铮。<br>
        承天更无己，紫气寻玉京。<br>
        执符定风水，蓑衣披浮名。<br>
        再无新与旧，万物共长生。
      </div>
    </div>
