      <h1>冬眠</h1>
      <div class="date">2017.12.8</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        近来颇恋冬日眠，鸡鸣不闻胜神仙。<br>
        人生一等幸福事，管得屋外几更天。
      </div>
