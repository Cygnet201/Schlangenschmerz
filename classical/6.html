      <h1>断章</h1>
      <div class="date">2020.2.26</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        无夜之夜，无冬之冬。<br>
        高楼广厦，气象无穷。<br>
        本已死去，却又重逢。
      </div>
