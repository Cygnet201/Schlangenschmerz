      <h1>忧愁</h1>
      <div class="date">2018.6.10</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        小山枯坐人消瘦，飞光劝我解忧愁。<br>
        更有书声十二载，声声刺入心上秋。
      </div>
