    <div class="poem-header">
      <h1>大学</h1>
      <div class="date">2017.9.30</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        才到大学喜欲狂，雏鹰展翅将翱翔。<br>
        烈日时时去驾云，山雨频频来渡江。<br>
        风华正茂是学子，国士无双有他乡。<br>
        略无疏狂与潇洒，星空倒酒醉池塘。
      </div>
    </div>
