      <h1>寒天</h1>
      <div class="date">2019.11.25</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        寒天缩被无所思，心乏昏昏偏灯明。<br>
        游龙静候打叶声，雾向四方一处行。
      </div>
