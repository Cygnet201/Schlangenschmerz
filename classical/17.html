    <div class="poem-header">
      <h1>迷途</h1>
      <div class="date">2018.11.31</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        迷途行路二十载，方知儒道皆难执。<br>
        也曾白眼向世俗，直问青山无忧池。<br>
        天地何有一真人，可令日月赏美食。<br>
        错把余情寄死神，黄昏分开醒与诗。
      </div>
    </div>
