      <h1>梅雨</h1>
      <div class="date">2017.12.3</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        茅屋忽宴城中客，丝竹管弦正自白。<br>
        纷繁扰乱难为绪，梅雨淅淅登春台。
      </div>
