    <div class="poem-header">
      <h1>雪雨</h1>
      <div class="date">2019.1.2</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        红尘由我不羁绊，小屋清泉紫甘蓝。<br>
        梅塘访友同入夜，清酒邀鬼共望山。<br>
        雪雨催诗兴所至，春风祈赋意阑珊。<br>
        万古人间无奉养，且看庙宇几凭栏。
      </div>
    </div>
