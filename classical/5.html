      <h1>渔夫</h1>
      <div class="date">2021.8.2</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        古来渔夫今钓叟，环海观汉竟未发。<br>
        钩拿星布缠了身，一河卷动万吨沙。
      </div>
