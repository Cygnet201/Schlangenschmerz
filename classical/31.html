      <h1>望山</h1>
      <div class="date">2017.12.4</div>
    </div>
    <div class="poem-body">
      <div class="stanza">
        苍鹰遥上白云巅，俯瞰三峡未着痕。<br>
        青山哽咽成芳草，四季香随远行人。
      </div>
