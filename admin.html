    .then(function(data) {
      if (!data || !data.length) {
        document.getElementById('adminMsg').textContent = '暂无评分数据';
        return;
      }
      ratingData = data;
      var total = 0, totalW = 0;
      for (var i = 0; i < data.length; i++) {
        total += data[i].count;
        totalW += data[i].avg * data[i].count;
      }
      document.getElementById('adminSummary').innerHTML =
        data.length + ' 首诗收到评分 &middot; ' + total + ' 人次 &middot; 整体均分 ' + (Math.round(totalW / total * 10) / 10);
      ratingData.sort(function(a, b) { return b.avg - a.avg; });
      renderList();
      document.getElementById('adminMsg').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
    })
    .catch(function(e) {
      if (e && e.debug) {
        document.getElementById('adminMsg').textContent =
          '权限不足 (jwt_type: ' + e.debug.jwt_type + ', user_id: ' + e.debug.user_id + ')';
      } else {
        document.getElementById('adminMsg').textContent = '加载失败: ' + (e.message || e.error || '未知错误');
      }
    });
  })();
  </script>
  <script>
(function() {
  var root = document.documentElement;
  var btn = document.getElementById('themeBtn');
  var saved = localStorage.getItem('theme');

  function isDark() {
    if (saved) return saved === 'dark';
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function apply() {
    if (saved) {
      root.setAttribute('data-theme', saved);
    } else {
      root.removeAttribute('data-theme');
    }
    btn.textContent = isDark() ? '\u2600' : '\u263D';
  }

  function toggleTheme() {
    var dark = isDark();
    saved = dark ? 'light' : 'dark';
    localStorage.setItem('theme', saved);
    apply();
  }

  window.toggleTheme = toggleTheme;
  apply();

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
    if (!localStorage.getItem('theme')) apply();
  });
})();
</script>
</body>
