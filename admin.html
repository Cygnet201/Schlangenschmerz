      var d = ratingData[i];
      var m = getInfo(d.poem);
      html += '<div class="rating-card">'
        + '<div class="rating-card-header" onclick="toggleDetails(' + i + ')">'
        + '<span class="card-rank">' + (i + 1) + '</span>'
        + '<span class="card-title"><a href="' + m.href + '" onclick="event.stopPropagation()">' + m.info.title + '</a></span>'
        + '<span class="card-stars">' + starsHtml(d.avg) + '</span>'
        + '<span class="card-avg">' + d.avg + '</span>'
        + '<span class="card-count">' + d.count + ' 人</span>'
        + '<span class="card-toggle" id="arr-' + i + '">\u25B8</span>'
        + '</div><div class="rating-details" id="det-' + i + '">';
      if (d.details) {
        for (var j = 0; j < d.details.length; j++) {
          var det = d.details[j];
          var t = det.updated_at ? det.updated_at.substring(0, 10) : '';
          html += '<div class="detail-row">'
            + '<span class="detail-name">' + (det.display_name || 'ID:' + det.user_id) + '</span>'
            + '<span class="detail-stars">' + starsHtml(det.score) + '</span>'
            + '<span>' + det.score + ' 分</span>'
            + '<span class="detail-time">' + t + '</span></div>';
        }
      }
      html += '</div></div>';
    }
    document.getElementById('ratingList').innerHTML = html;
  }

  (function() {
    var user;
    try { user = JSON.parse(localStorage.getItem('WALINE_USER')); } catch(e) {}
    if (!user || !user.token) {
      document.getElementById('adminMsg').textContent = '请先在诗集页面登录 Waline 管理员账号';
      return;
    }
    fetch(RATING_API + '?all=1', {
      headers: { 'Authorization': 'Bearer ' + user.token }
    })
    .then(function(r) {
      if (r.status === 403) return r.json().then(function(d) { throw d; });
      return r.json();
    })
    .then(function(data) {
      if (!data || !data.length) {
        document.getElementById('adminMsg').textContent = '暂无评分数据';
        return;
      }
      ratingData = data;
      var total = 0, totalW = 0;
      for (var i = 0; i < data.length; i++) {
        total += data[i].count;
        totalW += data[i].avg * data[i].count;
      }
      document.getElementById('adminSummary').innerHTML =
        data.length + ' 首诗收到评分 &middot; ' + total + ' 人次 &middot; 整体均分 ' + (Math.round(totalW / total * 10) / 10);
      ratingData.sort(function(a, b) { return b.avg - a.avg; });
      renderList();
      document.getElementById('adminMsg').style.display = 'none';
      document.getElementById('adminContent').style.display = 'block';
    })
    .catch(function(e) {
      if (e && e.debug) {
        document.getElementById('adminMsg').textContent =
          '权限不足 (jwt_type: ' + e.debug.jwt_type + ', user_id: ' + e.debug.user_id + ')';
      } else {
        document.getElementById('adminMsg').textContent = '加载失败: ' + (e.message || e.error || '未知错误');
      }
    });
  })();
  </script>
  <script>
(function() {
  var root = document.documentElement;
  var btn = document.getElementById('themeBtn');
  var saved = localStorage.getItem('theme');

  function isDark() {
    if (saved) return saved === 'dark';
    return window.matchMedia('(prefers-color-scheme: dark)').matches;
  }

  function apply() {
    if (saved) {
      root.setAttribute('data-theme', saved);
    } else {
      root.removeAttribute('data-theme');
    }
    btn.textContent = isDark() ? '\u2600' : '\u263D';
  }

  function toggleTheme() {
    var dark = isDark();
    saved = dark ? 'light' : 'dark';
    localStorage.setItem('theme', saved);
    apply();
  }

  window.toggleTheme = toggleTheme;
  apply();

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
    if (!localStorage.getItem('theme')) apply();
  });
})();
</script>
</body>
